<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drone Recon Strike</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #eee;
            overflow: hidden;
            touch-action: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: 800;
            color: #ff8800;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            display: block;
            width: 100%; height: 100%;
        }
        #ui {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        #joystick-area {
            /* Invisible touch region */
            pointer-events: auto;
        }
        #joystick-base {
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            top: 0; left: 0;
        }
        #joystick-stick {
            position: absolute;
            width: 50px; height: 50px;
            border-radius: 50%;
            background: rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 20px cyan;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            transition: transform 0.05s linear;
        }
        #score-board {
            position: absolute; top: 15px; left: 20px;
            font-size: 20px; line-height: 1.2;
            color: #ff8800;
            text-shadow: 2px 2px 0 #000;
            background: rgba(0,0,0,0.6);
            padding: 10px 15px;
            border-left: 5px solid #ff8800;
            clip-path: polygon(0 0, 100% 0, 90% 100%, 0 100%);
        }
        #hp-bar-bg {
            position: absolute;
            top: 145px; left: 20px;
            width: 80px; height: 6px;
            border: 1px solid #ff8800;
            background: rgba(0, 0, 0, 0.7);
        }
        #hp-bar {
            width: 100%; height: 100%;
            background: #ff2200;
            box-shadow: 0 0 5px #ff2200;
            transition: width 0.2s;
        }
        #ammo-bar-bg {
            position: absolute;
            top: 170px; left: 20px;
            width: 80px; height: 6px;
            border: 1px solid #ff8800;
            background: rgba(0, 0, 0, 0.7);
        }
        #ammo-bar {
            width: 100%; height: 100%;
            background: #ffaa00;
            box-shadow: 0 0 5px #ffaa00;
            transition: width 0.2s;
        }
        #ammo-alert {
            position: absolute; top:0; left:0; width:100%; height:100%;
            text-align: center; color: #fff; font-size: 11px; font-weight: 900; line-height: 18px;
            pointer-events: none; text-shadow: 1px 1px 2px #000;
        }
        #gameover {
            display: none;
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10, 0, 0, 0.85);
            color: #ff3333;
            flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 100; pointer-events: auto;
        }
        .title {
            font-size: 60px; font-weight: bold;
            text-shadow: 0 0 20px #ff3333;
            margin-bottom: 20px; text-align: center;
        }
        .restart {
            margin-top: 40px; font-size: 24px; font-weight: bold;
            padding: 15px 40px; border: 2px solid white;
            color: white; border-radius: 8px;
            background: rgba(255,255,255,0.1);
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
            transition: all 0.2s;
        }
        .restart:hover { background: rgba(255,255,255,0.3); }

        @media (max-width: 768px) {
            .instruction { display: none; } /* Hide on mobile to save space */
        }
        @media (max-width: 768px) {
            .instruction { display: none; } /* Hide on mobile to save space */
        }


        #titlescreen {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #001122 0%, #000 100%);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 200; pointer-events: auto;
        }
        .start-btn {
            margin-top: 50px; font-size: 32px; font-weight: 900;
            padding: 20px 80px; border: 4px solid #ff8800;
            color: #ff8800; border-radius: 0;
            background: rgba(0,0,0,0.8);
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255,136,0,0.5);
            text-shadow: 2px 2px 4px #000;
            transition: all 0.2s;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }
        .start-btn:hover { background: #ff8800; color: #000; box-shadow: 0 0 40px #ff8800; transform: scale(1.1); }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui">
        <div id="score-board">
             SCORE: <span id="scoreVal" style="font-size: 26px;">0</span><br>
            <span style="font-size:16px;">LEVEL: <span id="levelVal">1</span></span><br>
            <span style="font-size:14px; color:#ffcc00;">MAX LOCKS: <span id="maxLockVal">10</span></span><br>
            <span style="font-size:14px; opacity: 0.7;">HIGH SCORE: <span id="bestScoreVal">0</span></span>
        </div>
        <div id="hp-bar-bg">
            <div style="position:absolute; top:-12px; left:0; font-size:7px; color:#ff8800; white-space:nowrap;">LIFELINE</div>
            <div id="hp-bar"></div>
        </div>
        <div id="ammo-bar-bg">
            <div style="position:absolute; top:-12px; left:0; font-size:7px; color:#ff8800; white-space:nowrap;">AMMO</div>
            <div id="ammo-bar"></div>
            <div id="ammo-alert"></div>
        </div>

        <div id="joystick-area" style="position: absolute; top:0; left:0; width:100%; height:100%; pointer-events:auto;">
            <div id="joystick-base" style="display:none;"><div id="joystick-stick"></div></div>
        </div>

    </div>

    <div id="titlescreen">
        <div class="title" style="color: #0df; text-shadow: 0 0 20px #0df;">DRONE RECON STRIKE</div>
        <div style="color: #aaa; font-size: 18px; margin-top:20px;">[ AUTO-BATTLER TACTICAL ACTION ]</div>
        <div class="start-btn" id="startBtn">START MISSION</div>
    </div>
    
    <div id="gameover">
        <div class="title">MISSION FAILED</div>
        <div style="font-size: 24px; color: white;">FINAL SCORE: <span id="finalScoreVal">0</span></div>
        <div class="restart" id="restartBtn">RESTART</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        
        const fogCanvas = document.createElement('canvas');
        const fogCtx = fogCanvas.getContext('2d', { alpha: true });
        
        let width, height;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            fogCanvas.width = width;
            fogCanvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        // ---- Game Constants & State ----
        const world = {
            camera: { x: 0, y: 2000, z: -700, pitch: Math.PI * 0.40, fov: 600 },
        };
        
        let gameState = {
            score: 0,
            highScore: localStorage.getItem('drs_score') || 0,
            playerHP: 100,
            level: 1,
            exp: 0,
            maxLocks: 15, // Increased starting locks
            bossActive: false,
            isOver: false,
            lastTime: performance.now(),
            ammo: 100, // Boosted starting ammo
            reloadTimer: 0,
            totalFiredSinceReload: 0,
            resourceSpawnTimer: 0,
            maxLockLogSent: false
        };
        
        document.getElementById('bestScoreVal').innerText = gameState.highScore;

        // Entities
        let player = { x: 0, y: 0, z: 200, radius: 25, dashTimer: 0, dashCooldown: 0 };
        let drones = [
            { id: 0, x: 0, y: 40, z: 250, radarAngle: 0, radius: 10, radarRadius: 700 },
            { id: 1, x: -150, y: 40, z: 250, radarAngle: 2.09, radius: 10, radarRadius: 700 }, 
            { id: 2, x: 150, y: 40, z: 250, radarAngle: 4.18, radius: 10, radarRadius: 700 }
        ];
        let enemies = [];
        let missiles = [];
        let enemyProjectiles = [];
        let particles = [];
        let dataCores = [];
        let resources = [];
        let screenShake = { x: 0, y: 0, time: 0, intensity: 0 };
        
        let comboTimer = 0;
        let comboCount = 0;
        
        let radarAngle = 0;
        
        // UI Messages Log
        let uiMessages = [];
        function addMessage(text, color = '#333') {
            uiMessages.push({ text, color, time: 10.0 });
            if (uiMessages.length > 8) uiMessages.shift(); // Max 8 messages visible
        }

        // ---- Audio System (Web Audio API) ----
        let actx = null;
        let masterNode = null;

        function initAudio() {
            if (actx) return;
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            actx = new AudioContext();
            masterNode = actx.createGain();
            masterNode.gain.value = 0.4;
            masterNode.connect(actx.destination);
        }

        function playTone(freq, type, duration, vol=1.0) {
            if (!actx) return null;
            let osc = actx.createOscillator();
            let gain = actx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, actx.currentTime);
            
            gain.gain.setValueAtTime(vol, actx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + duration);
            
            osc.connect(gain);
            gain.connect(masterNode);
            osc.start();
            osc.stop(actx.currentTime + duration);
            return {osc, gain};
        }

        function sfxLock(level) {
            playTone(400 + level*150, 'square', 0.05, 0.05);
        }
        
        function sfxFire() {
            if (!actx) return;
            let o = playTone(800, 'sawtooth', 0.3, 0.15);
            o.osc.frequency.exponentialRampToValueAtTime(100, actx.currentTime + 0.3);
        }

        function sfxExplode() {
            if (!actx) return;
            let bufferSize = actx.sampleRate * 0.5; // 0.5s noise
            let buffer = actx.createBuffer(1, bufferSize, actx.sampleRate);
            let data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            
            let noiseNode = actx.createBufferSource();
            noiseNode.buffer = buffer;
            let noiseFilter = actx.createBiquadFilter();
            noiseFilter.type = 'lowpass';
            noiseFilter.frequency.value = 800;
            
            let noiseGain = actx.createGain();
            noiseGain.gain.setValueAtTime(0.4, actx.currentTime);
            noiseGain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.5);

            noiseNode.connect(noiseFilter);
            noiseFilter.connect(noiseGain);
            noiseGain.connect(masterNode);
            noiseNode.start();
        }

        function sfxLevelUp() {
            if (!actx) return;
            let t = actx.currentTime;
            [880, 1046, 1318].forEach((f, i) => { // High fast major arpeggio
                let osc = actx.createOscillator();
                let gain = actx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(f, t + i*0.05);
                gain.gain.setValueAtTime(0.0, t);
                gain.gain.setValueAtTime(0.1, t + i*0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, t + i*0.05 + 0.1);
                osc.connect(gain);
                gain.connect(masterNode);
                osc.start(t + i*0.05);
                osc.stop(t + i*0.05 + 0.1);
            });
        }

        // Terrain logic: static grid using sine/cosine waves
        const tSize = 120; // Grid cell size
        const tViewRadius = 14;  // Cells rendered in each direction from camera
        
        function getTerrainHeight(x, z) {
            // Smooth natural hills using layered noise/sine waves
            let nx = x * 0.0015;
            let nz = z * 0.0015;
            let h1 = Math.sin(nx) * Math.cos(nz) * 400;
            let h2 = Math.sin(nx * 2.5 + 4) * Math.cos(nz * 2.5 + 2) * 150;
            // Introduce some flat valley floors
            let total = h1 + h2;
            return total < 0 ? total * 0.3 : total; // Valleys are shallower than mountains
        }

        const MAX_SLOPE = 1.0;
        function tryMove(obj, dx, dz) {
            let dist = Math.hypot(dx, dz);
            if (dist <= 0) return;
            
            let curH = getTerrainHeight(obj.x, obj.z);
            let nextH = getTerrainHeight(obj.x + dx, obj.z + dz);
            let slope = (nextH - curH) / dist;
            
            // Speed mult: 1.0 on flat/downhill. Reduces towards 0 as slope approaches MAX_SLOPE.
            let speedMult = 1.0;
            if (slope > 0) {
                speedMult = Math.max(0.1, 1.0 - (slope / MAX_SLOPE)); // Min 10% speed so they don't get completely stuck forever
            }
            
            obj.x += dx * speedMult;
            obj.z += dz * speedMult;
        }

        function initTerrain() {
            // No longer needed to instantiate rows
        }

        // ---- Input Handling ----
        const keys = { w: false, a: false, s: false, d: false };

        window.addEventListener('keydown', e => {
            let k = e.key.toLowerCase();
            if (k === 'arrowup') k = 'w';
            if (k === 'arrowdown') k = 's';
            if (k === 'arrowleft') k = 'a';
            if (k === 'arrowright') k = 'd';
            if (keys.hasOwnProperty(k)) keys[k] = true;
        });
        
        window.addEventListener('keyup', e => {
            let k = e.key.toLowerCase();
            if (k === 'arrowup') k = 'w';
            if (k === 'arrowdown') k = 's';
            if (k === 'arrowleft') k = 'a';
            if (k === 'arrowright') k = 'd';
            
            if (k === ' ' || k === 'escape') {
                fireMissiles();
            }

            if (keys.hasOwnProperty(k)) keys[k] = false;
        });

        // Touch Joystick
        const joyArea = document.getElementById('joystick-area');
        const joyStick = document.getElementById('joystick-stick');
        let joyTouchId = null;
        let joyCenter = { x: 70, y: 70 }; // relative to 140x140 area
        let joyInput = { x: 0, y: 0 };

        joyArea.addEventListener('touchstart', e => {
            e.preventDefault();
            let rect = joyArea.getBoundingClientRect();
            for (let t of e.changedTouches) {
                if (joyTouchId === null) {
                    joyTouchId = t.identifier;
                    joyCenter.x = t.clientX - rect.left;
                    joyCenter.y = t.clientY - rect.top;
                    
                    document.getElementById('joystick-base').style.display = 'block';
                    document.getElementById('joystick-base').style.left = (joyCenter.x - 70) + 'px';
                    document.getElementById('joystick-base').style.top = (joyCenter.y - 70) + 'px';
                    
                    updateJoy(t.clientX - rect.left, t.clientY - rect.top);
                }
            }
        }, {passive: false});

        joyArea.addEventListener('touchmove', e => {
            e.preventDefault();
            let rect = joyArea.getBoundingClientRect();
            for (let t of e.changedTouches) {
                if (t.identifier === joyTouchId) {
                    updateJoy(t.clientX - rect.left, t.clientY - rect.top);
                }
            }
        }, {passive: false});

        function endJoy(e) {
            e.preventDefault();
            for (let t of e.changedTouches) {
                if (t.identifier === joyTouchId) {
                    joyTouchId = null;
                    joyInput = { x: 0, y: 0 };
                    joyStick.style.transform = `translate(-50%, -50%)`;
                    document.getElementById('joystick-base').style.display = 'none';
                    // Tactical Fire: Release to blast
                    fireMissiles();
                }
            }
        }
        joyArea.addEventListener('touchend', endJoy, {passive: false});
        joyArea.addEventListener('touchcancel', endJoy, {passive: false});

        function updateJoy(px, py) {
            let dx = px - joyCenter.x;
            let dy = py - joyCenter.y;
            let dist = Math.hypot(dx, dy);
            let maxD = 40;
            if (dist > maxD) {
                dx = (dx/dist)*maxD;
                dy = (dy/dist)*maxD;
            }
            joyStick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            joyInput.x = dx / maxD;
            joyInput.y = dy / maxD;
        }

        // Control cleanup (auto-logic is handled in update loop)

        // ---- Core Logic ----

        function resetGame() {
            gameState.score = 0;
            gameState.playerHP = 100;
            gameState.level = 1;
            gameState.exp = 0;
            gameState.maxLocks = 10;
            gameState.isOver = false;
            comboCount = 0;
            document.getElementById('scoreVal').innerText = '0';
            document.getElementById('levelVal').innerText = '1';
            document.getElementById('maxLockVal').innerText = '3';
            updateHP();
            document.getElementById('gameover').style.display = 'none';
            player.x = 0; player.z = 200; player.dashTimer = 0; player.dashCooldown = 0;
            drones.forEach((d, i) => {
                d.x = 0; d.y = 40; d.z = 250; d.radarAngle = i * 2.09;
            });
            enemies = [];
            missiles = [];
            enemyProjectiles = [];
            particles = [];
            resources = [];
            dataCores = [];
            
            gameState.ammo = 100;
            gameState.reloadTimer = 0;
            gameState.totalFiredSinceReload = 0;
            gameState.resourceSpawnTimer = 0;
            uiMessages = [];
            updateAmmoBar();
            
            initTerrain();
            gameState.lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        document.getElementById('restartBtn').addEventListener('click', resetGame);

        function updateHP() {
            document.getElementById('hp-bar').style.width = Math.max(0, gameState.playerHP) + '%';
            if (gameState.playerHP <= 0 && !gameState.isOver) {
                gameState.isOver = true; // Check if dead
                
                if (gameState.score > gameState.highScore) {
                    gameState.highScore = gameState.score;
                    localStorage.setItem('drs_score', gameState.highScore);
                    document.getElementById('bestScoreVal').innerText = gameState.highScore;
                }
                
                document.getElementById('gameover').style.display = 'flex';
                document.getElementById('finalScoreVal').innerText = gameState.score;
                createExplosion(player.x, player.y, player.z, 200, '#0df');
                shakeCamera(1.5, 30);
            }
        }

        function shakeCamera(time, intensity) {
            screenShake.time = time;
            screenShake.intensity = intensity;
        }

        function doDash() {
            if (player.dashCooldown <= 0 && !gameState.isOver) {
                player.dashTimer = 0.3; // 300ms dash invuln
                player.dashCooldown = 1.0; // shortened cooldown for auto
                shakeCamera(0.2, 5);
            }
        }

        function updateAmmoBar() {
            let maxCapacity = 100 + (gameState.level - 1) * 50; 
            let pct = Math.max(0, Math.min(100, (gameState.ammo / maxCapacity) * 100));
            document.getElementById('ammo-bar').style.width = pct + '%';
        }

        function project(x, y, z) {
            let cx = x - world.camera.x;
            let cy = y - world.camera.y; 
            let cz = z - world.camera.z;

            let cosP = Math.cos(world.camera.pitch);
            let sinP = Math.sin(world.camera.pitch);
            
            // Pitch world UP
            let yRot = cy * cosP + cz * sinP;
            let zRot = -cy * sinP + cz * cosP;

            if (zRot < 0.1) zRot = 0.1;
            let scale = world.camera.fov / zRot;
            
            return {
                x: width / 2 + cx * scale,
                y: height / 2 - yRot * scale,
                scale: scale,
                z: zRot
            };
        }

        function fireMissiles() {
            if (gameState.reloadTimer > 0) return; // Cannot fire while reloading
            let totalLocks = enemies.reduce((sum, e) => sum + e.locks, 0);
            if (gameState.ammo < totalLocks) return; // Not enough ammo to fire current locks
            
            let targets = enemies.filter(e => e.locks > 0);
            if (targets.length === 0) return;

            sfxFire(); // Play one loud sound for barrage
            
            let missilesFired = 0;
            for (let t of targets) {
                let lockCount = t.locks;
                if (lockCount === 0) continue;
                
                t.locks = 0;
                t.targeted = true;
                
                for (let i = 0; i < lockCount; i++) {
                    const MIN_ENGAGE_DISTANCE = 300;
                    let distToTarget = Math.hypot(t.x - player.x, t.z - player.z);
                    let closePenalty = Math.max(0, (MIN_ENGAGE_DISTANCE - distToTarget) / MIN_ENGAGE_DISTANCE);
                    let veerX = closePenalty * (Math.random() - 0.5) * 3000;
                    let veerZ = closePenalty * (Math.random() - 0.5) * 3000;
                    let outX = (Math.random() - 0.5) * 800; // Barrage spread
                    let outZ = (Math.random() - 0.5) * 800;
                    missiles.push({
                        x: player.x,
                        y: player.y + 10,
                        z: player.z,
                        startY: player.y + 10,
                        vx: outX + veerX,
                        vy: 600 + Math.random() * 600,
                        vz: outZ + veerZ,
                        tObj: t,
                        time: 0,
                        type: Math.floor(Math.random() * 3),
                        trail: []
                    });
                    missilesFired++;
                }
            }
            
            // Ammo and Reload logic
            if (missilesFired > 0) {
                let prevAmmo = gameState.ammo;
                gameState.ammo -= missilesFired;
                updateAmmoBar();
                gameState.totalFiredSinceReload += missilesFired;
                
                // Force a reload after every 20 shots
                if (gameState.totalFiredSinceReload >= 20) {
                    gameState.reloadTimer = 3.0;
                    gameState.totalFiredSinceReload = 0; // reset for next magazine
                    addMessage("> Warning: Reloading Magazine...", "#f80");
                }
                
                if (gameState.ammo < 10 && prevAmmo >= 10) {
                    addMessage("> CRITICAL: Out of Ammo", "#f00");
                }
            }
        }

        function addExp(amount) {
            gameState.exp += amount;
            let reqExp = gameState.level * 30; // Further reduced hurdles
            while (gameState.exp >= reqExp) {
                gameState.exp -= reqExp;
                gameState.level++;
                document.getElementById('levelVal').innerText = gameState.level;
                
                // Increase Attributes
                gameState.maxLocks += 2;
                document.getElementById('maxLockVal').innerText = gameState.maxLocks;
                
                drones.forEach(d => {
                    d.radarRadius += 50;
                });

                // Increase ammo limit by 20 and refill ammo
                gameState.ammo += 50; // refill
                updateAmmoBar();
                
                addMessage(`> Level Up! Locks+2, Radar+50, Ammo Refilled`, "#0f0");
                
                sfxLevelUp();
                // level up flash
                createExplosion(player.x, player.y, player.z, 2, '#0f0');
                
                // Re-calculate reqExp for next level inside while loop
                reqExp = gameState.level * 30;
            }
        }

        function sfxBossSpawn() {
            if (!actx) return;
            playTone(150, 'sawtooth', 2.0, 0.4);
            setTimeout(() => playTone(120, 'sawtooth', 2.0, 0.4), 500);
        }

        function sfxCollect() {
            if (!actx) return;
            playTone(800, 'sine', 0.1, 0.1);
            setTimeout(() => playTone(1200, 'sine', 0.15, 0.1), 50);
        }

        function spawnEnemy() {
            // Strictly prevent mob spawning while a boss is active to focus firepower
            if (enemies.some(e => e.isBoss)) return; 
            
            if (gameState.level > 0 && gameState.level % 5 === 0) {
                gameState.bossActive = true;
                enemies = []; 
                addMessage("> ALERT: Massive energy signature detected... Possible Boss encounter.", "#f00");
                sfxBossSpawn();
                let ang = Math.random() * Math.PI * 2;
                let bx = player.x + Math.cos(ang) * 3500;
                let bz = player.z + Math.sin(ang) * 3500;
                let bossId = performance.now();

                // The Boss: HEX-CORE OBLITERATOR
                enemies.push({
                    x: bx, y: 0, z: bz,
                    radius: 200,
                    hp: 150 + (gameState.level * 60), 
                    maxHp: 150 + (gameState.level * 60),
                    locks: 0, targeted: false,
                    speed: 120,
                    hoverTime: 0,
                    state: 'init', // AI handles transition
                    stateTimer: 2.0,
                    isBoss: true,
                    bossId: bossId,
                    dashCooldown: 0 
                });

                // Core Launchers: 6 hexagonal sub-units that control boss firepower
                for (let i = 0; i < 6; i++) {
                    let eAng = (i / 6) * Math.PI * 2;
                    enemies.push({
                        x: bx + Math.cos(eAng) * 400, y: 80, z: bz + Math.sin(eAng) * 400,
                        radius: 35, hp: 12, maxHp: 12, // Tougher components
                        locks: 0, targeted: false,
                        speed: 400, hoverTime: Math.random() * 10,
                        state: 'escort', stateTimer: 0,
                        isBoss: false, type: 'launcher',
                        squadId: bossId, // link to boss
                        orbitAngle: eAng
                    });
                }
                return;
            }

            // Squad Spawn (Missiler, Gunner, Patrol)
            // Squad Spawn (1 Missiler, 3 Gunners, 3 Patrols)
            let ang = Math.random() * Math.PI * 2;
            let dist = 1400 + Math.random() * 400;
            let cx = player.x + Math.cos(ang) * dist;
            let cz = player.z + Math.sin(ang) * dist;
            let squadId = performance.now(); // unique ID
            
            // Missiler (Hardest) x 1
            enemies.push({ x: cx, y: 0, z: cz, radius: 18, hp: 5, maxHp: 5, locks: 0, targeted: false, speed: 200 + (gameState.level * 15), hoverTime: Math.random() * 10, state: 'approach', stateTimer: 0, isBoss: false, type: 'missiler', dashCooldown: 0, interceptCooldown: 0, squadId: squadId });
            
            // Gunners (Medium) x 3
            for(let i=0; i<3; i++) {
                let offX = (Math.random() - 0.5) * 200;
                let offZ = (Math.random() - 0.5) * 200;
                enemies.push({ x: cx + offX, y: 0, z: cz + offZ, radius: 12, hp: 1, maxHp: 1, locks: 0, targeted: false, speed: 280 + (gameState.level * 20), hoverTime: Math.random() * 10, state: 'approach', stateTimer: 0, isBoss: false, type: 'gunner', dashCooldown: 0, interceptCooldown: 0, squadId: squadId });
            }
            
            // Interceptor Squad (High-speed scouts) x 1 squad
            if (gameState.level >= 2 && Math.random() < 0.3) {
                for(let i=0; i<2; i++) {
                    let offX = (Math.random() - 0.5) * 400;
                    let offZ = (Math.random() - 0.5) * 400;
                    enemies.push({ x: cx + offX, y: 0, z: cz + offZ, radius: 10, hp: 8, maxHp: 8, locks: 0, targeted: false, 
                                   speed: 500 + (gameState.level * 20), hoverTime: Math.random() * 10, state: 'approach', stateTimer: 0, 
                                   isBoss: false, type: 'interceptor', dashCooldown: 0, squadId: squadId });
                }
            }
        }

        function createExplosion(x, y, z, scale = 1, forceColor = null) {
            sfxExplode();
            // Flash
            particles.push({
                x, y, z, vx:0, vy:0, vz:0,
                time: 0.15, maxTime: 0.15,
                color: forceColor || '#ff8800', size: 150 * scale, isFlash: true
            });
            // Debris
            for(let i=0; i<25; i++) {
                let ang = Math.random() * Math.PI * 2;
                let spd = Math.random() * 600 * scale;
                let up = Math.random() * 500 * scale;
                particles.push({
                    x, y, z,
                    vx: Math.cos(ang) * spd,
                    vy: up, // + is UP in world
                    vz: Math.sin(ang) * spd,
                    time: 0.5 + Math.random()*0.5,
                    maxTime: 1.0,
                    color: forceColor || (Math.random() > 0.5 ? '#ff3333' : '#ff9900'),
                    size: (15 + Math.random()*25) * scale
                });
            }
        }

        let autoLockTimer = 0;

        function update(dt) {
            if (gameState.isOver) {
                // Keep moving particles for cool effect after death
                updateParticles(dt);
                return;
            }

            // --- Auto-Lock and Auto-Fire Logic (Drone Radar) ---
            autoLockTimer += dt;
            // Base lock-on interval is 0.15s, reduced by 0.015s per level (cap at 0.05s)
            let lockInterval = Math.max(0.05, 0.15 - (gameState.level - 1) * 0.015);
            if (autoLockTimer > lockInterval) { 
                autoLockTimer = 0;
                
                let totalLocks = 0;
                for (let e of enemies) totalLocks += e.locks;

                // Phase 11: Narrow initial sensor radius (80 at Lv1, +80/level)
                let playerSensorRadius = 80 + (gameState.level - 1) * 80;

                // Find valid targets in drone radar range OR player sensor range
                let validTargets = [];
                for (let e of enemies) {
                    let inDroneRange = drones.some(d => Math.hypot(e.x - d.x, e.z - d.z) < d.radarRadius);
                    let inPlayerRange = Math.hypot(e.x - player.x, e.z - player.z) < playerSensorRadius;
                    // Global Boss & Launcher tracking: Always valid targets regardless of range
                    let isGlobalTarget = e.isBoss || e.type === 'launcher';
                    let lockCap = e.isBoss ? Math.max(15, gameState.maxLocks) : (e.type === 'launcher' ? 6 : 4);
                    if ((inDroneRange || inPlayerRange || isGlobalTarget) && e.locks < lockCap) {
                        validTargets.push(e);
                    }
                }

                if (totalLocks < gameState.maxLocks && validTargets.length > 0) {
                    // Sort primarily by locks (ascending) to distribute firepower, then by distance to formation center
                    let cx = (drones[0].x + drones[1].x + drones[2].x) / 3;
                    let cz = (drones[0].z + drones[1].z + drones[2].z) / 3;
                    validTargets.sort((a,b) => {
                        // Priority 1: Launchers first (to disable weapons)
                        let aPrio = a.type === 'launcher' ? 0 : (a.isBoss ? 2 : 1);
                        let bPrio = b.type === 'launcher' ? 0 : (b.isBoss ? 2 : 1);
                        if (aPrio !== bPrio) return aPrio - bPrio;
                        
                        if (a.locks !== b.locks) return a.locks - b.locks;
                        return Math.hypot(a.x - cx, a.z - cz) - Math.hypot(b.x - cx, b.z - cz);
                    });
                    let t = validTargets[0];
                    t.locks++;
                    sfxLock(t.locks);
                    particles.push({
                        x: t.x, y: t.y, z: t.z, vx: 0, vy: 0, vz: 0,
                        time: 0.1, maxTime: 0.1, color: 'rgba(0,255,255,0.4)', size: 80, isRing: true
                    });
                }
                
                // Auto Fire condition: DISABLED for tactical hold-to-lock/release-to-fire
                // Instead, we just show "LOCKING" status if we have locks
                if (totalLocks > 0 && gameState.reloadTimer <= 0) {
                    let alertMsg = isSaturated ? "MAX LOCKS REACHED" : `LOCKING... (${totalLocks})`;
                    document.getElementById('ammo-alert').innerText = alertMsg;

                    // Log notification for Max Lock
                    if (totalLocks >= gameState.maxLocks && !gameState.maxLockLogSent) {
                        addMessage("> READY: MAX LOCKS REACHED. FIRE AT WILL!", "#0ff");
                        gameState.maxLockLogSent = true;
                    }
                } else {
                    document.getElementById('ammo-alert').innerText = "";
                    if (totalLocks < gameState.maxLocks) {
                        gameState.maxLockLogSent = false;
                    }
                }
            }
            
            // Reload logic
            if (gameState.reloadTimer > 0) {
                gameState.reloadTimer -= dt;
            }

            // Dash status
            if (player.dashTimer > 0) {
                player.dashTimer -= dt;
                // Dash afterimage
                if (Math.random() < 0.3) {
                     particles.push({
                        x: player.x, y: player.y, z: player.z,
                        vx: 0, vy: 0, vz: 0, time: 0.2, maxTime: 0.2, color: 'rgba(0, 255, 255, 0.4)', size: player.radius*1.5, isRing: false
                     });
                }
            }
            if (player.dashCooldown > 0) {
                player.dashCooldown -= dt;
            }

            // Combo Timer
            if (comboTimer > 0) {
                comboTimer -= dt;
                if (comboTimer <= 0) {
                    if (comboCount >= 2) {
                         addMessage(`> COMBO x${comboCount}!`, '#888');
                    }
                    comboCount = 0;
                }
            }

            // --- Auto Evasion ---
            if (player.dashCooldown <= 0) {
                for (let ep of enemyProjectiles) {
                    let dToProj = Math.hypot(ep.x - player.x, ep.z - player.z);
                    if (dToProj < 200 && ep.z > player.z) { // projectile is close and approaching
                        doDash();
                        break;
                    }
                }
            }

            // Data Cores & Resources (Magnet + Collection)
            let magnetRadius = 400 + (gameState.level * 10); // Magnet grows with level
            
            // Process Data Cores (EXP)
            for (let i = dataCores.length - 1; i >= 0; i--) {
                let c = dataCores[i];
                let dist = Math.hypot(c.x - player.x, c.y - player.y, c.z - player.z);

                c.time = (c.time || 0) + dt; // Ensure time is incremented for magnet pull
                
                // Tick down lifetime
                if (c.lifetime !== undefined) {
                    c.lifetime -= dt;
                    if (c.lifetime <= 0) {
                        dataCores.splice(i, 1);
                        continue;
                    }
                }

                if (dist < magnetRadius && c.time > 0.5) {
                    let spd = 1200 * dt;
                    c.x += (player.x - c.x) / dist * spd;
                    c.y += (player.y - c.y) / dist * spd;
                    c.z += (player.z - c.z) / dist * spd;
                }
                
                if (dist < player.radius + 15) {
                    addExp(20);
                    sfxCollect();
                    particles.push({
                        x: player.x, y: player.y, z: player.z, vx: 0, vy: 0, vz: 0,
                        time: 0.1, maxTime: 0.1, color: '#ffea00', size: 40, isRing: true
                    });
                    dataCores.splice(i, 1);
                    continue;
                }

                if (c.z < world.camera.z) {
                    dataCores.splice(i, 1);
                }
            }
            
            // Process Resources (Ammo)
            for (let i = resources.length - 1; i >= 0; i--) {
                let r = resources[i];
                let dist = Math.hypot(r.x - player.x, r.y - player.y, r.z - player.z);
                
                r.age += dt;
                if (r.age > 30.0) { // Despawn after 30s
                    resources.splice(i, 1);
                    continue;
                }
                
                // Auto-collect range is smaller than EXP cores to require deliberate pickup
                let collectRange = 400; // GREATLY increased magnetic pull distance
                if (dist < collectRange) {
                    let spd = 2000 * dt; // Much faster magnetic pull
                    r.x += (player.x - r.x) / dist * spd;
                    r.y += (player.y - r.y) / dist * spd;
                    r.z += (player.z - r.z) / dist * spd;
                }
                
                // Increased collection hit radius
                if (dist < player.radius + 60) {
                    // Refill ammo (+50 per resource)
                    let maxAmmo = 100 + (gameState.level - 1) * 50; 
                    let added = Math.min(50, maxAmmo - gameState.ammo);
                    gameState.ammo = Math.min(gameState.ammo + 50, maxAmmo);
                    updateAmmoBar();
                    
                    if (added > 0) {
                        addMessage(`> Ammo Replenished (+${added})`, "#888");
                    }
                    
                    sfxCollect(); // Play sound
                    // Collection flash
                    particles.push({
                        x: player.x, y: player.y, z: player.z, vx: 0, vy: 0, vz: 0,
                        time: 0.1, maxTime: 0.1, color: '#f80', size: 100, isRing: true
                    });
                    
                    resources.splice(i, 1);
                }
            }
            
            // Random Map Resource Spawning
            gameState.resourceSpawnTimer += dt;
            if (gameState.resourceSpawnTimer > 4.0 && resources.length < 15) {
                gameState.resourceSpawnTimer = 0;
                let angle = Math.random() * Math.PI * 2;
                let dist = 800 + Math.random() * 800; // Spawn 800-1600 units away
                let spawnX = player.x + Math.cos(angle) * dist;
                let spawnZ = player.z + Math.sin(angle) * dist;
                resources.push({
                    x: spawnX,
                    y: getTerrainHeight(spawnX, spawnZ) + 15, // Spawn directly on the ground, slightly elevated
                    z: spawnZ,
                    vx: 0, vy: 0, vz: 0,
                    time: 0,
                    age: 0 // Used for 30s despawn
                });
            }
            
            // --- Player Movement (360 degrees) ---
            let moveSpeed = 1000 * (player.dashTimer > 0 ? 3.5 : 1.5); // Boosted base speed 1.5x
            let mx = (keys.d ? 1 : 0) - (keys.a ? 1 : 0) + joyInput.x;
            let mz = (keys.w ? 1 : 0) - (keys.s ? 1 : 0) - joyInput.y; // Correct direction for joyInput.y

            if (mx !== 0 || mz !== 0) {
                let mag = Math.hypot(mx, mz);
                tryMove(player, (mx/mag) * moveSpeed * dt, (mz/mag) * moveSpeed * dt);
            }
            
            // Dash Logic (Key or Button)
            if ((keys[' '] || player.dashRequested) && player.dashCooldown <= 0) {
                player.dashRequested = false; 
                let dashBaseCD = Math.max(0.4, 1.0 - (gameState.level - 1) * 0.05);
                player.dashCooldown = dashBaseCD;
                player.dashTimer = 0.2;
                sfxFire(); // Use existing fire as placeholder for dash sfx
                createExplosion(player.x, player.y, player.z, 0.5, '#0ff');
            }

            // 360-degree Top-Down bounds
            // No strict clamping; open world map.

            // Hover strictly over terrain
            player.y = getTerrainHeight(player.x, player.z) + Math.sin(performance.now() * 0.005) * 10 + 20;

            let tN = performance.now();
            // Drone AI companion movement (3-way separated tethered seek)
            drones.forEach((d, idx) => {
                let angleOffset = idx * (Math.PI * 2 / 3);
                
                // Base formation anchor (orbiting the player, 2x further distance)
                let distBase = 750;
                let anchorX = player.x + Math.cos(tN * 0.0003 + angleOffset) * distBase;
                let anchorZ = player.z - 100 + Math.sin(tN * 0.0003 + angleOffset) * distBase;
                
                // Find nearest enemy to THIS drone's ANCHOR position to keep them separated
                let nearestSq = Infinity;
                let targetE = null;
                for (let e of enemies) {
                    let dSq = (e.x - anchorX)**2 + (e.z - anchorZ)**2;
                    // Only target if within its 2700-unit operational sector
                    if (dSq < nearestSq && dSq < 2700 * 2700) {
                        nearestSq = dSq;
                        targetE = e;
                    }
                }
                
                let targetX = anchorX;
                let targetZ = anchorZ;

                if (targetE) {
                    // Try to hover over the enemy, but clamped to a max reach from the anchor
                    // so they maintain their 3-way separation angles
                    let tx = targetE.x - anchorX;
                    let tz = targetE.z - 50 - anchorZ;
                    let tLen = Math.hypot(tx, tz);
                    const MAX_REACH = 1800;
                    if (tLen > MAX_REACH) {
                        tx = (tx / tLen) * MAX_REACH;
                        tz = (tz / tLen) * MAX_REACH;
                    }
                    targetX = anchorX + tx;
                    targetZ = anchorZ + tz;
                }
                
                // Keep moving drones constantly to keep them lively
                let jitterX = Math.cos(tN * 0.002 + idx) * 50;
                let jitterZ = Math.sin(tN * 0.0015 + idx) * 50;

                d.x += (targetX + jitterX - d.x) * dt * 2.5;
                d.z += (targetZ + jitterZ - d.z) * dt * 2.5;
                d.y = getTerrainHeight(d.x, d.z) + 160 + Math.sin(tN * 0.004 + idx) * 30;
                d.radarAngle += dt * 3;
            });

            // Camera follow (ease top-down XZ)
            world.camera.x += (player.x - world.camera.x) * dt * 4;
            world.camera.z += (player.z - 700 - world.camera.z) * dt * 4;

            // Enemies overall cap (reduced to combat clutter since 1 squad = 7 mobs)
            let maxEnemies = 14 + Math.floor(gameState.level * 2);
            let spawnChance = 0.05 + (gameState.level * 0.02);
            if (enemies.length < maxEnemies && Math.random() < spawnChance) spawnEnemy();

            let patrolAlive = enemies.some(e => !e.isBoss && e.type === 'patrol');
            let baseEngageDist = patrolAlive ? 1200 : 700;
            let missilerAmmo = patrolAlive ? 4 : 2;

            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                e.hoverTime += dt * 5;
                e.y = getTerrainHeight(e.x, e.z) + 10 + Math.sin(e.hoverTime) * 15; // hover over terrain
                if (e.dashCooldown > 0) e.dashCooldown -= dt; // Phase 10: Tick down dash cooldown
                if (e.interceptCooldown > 0) e.interceptCooldown -= dt; // Missile interception cooldown
                
                // State machine
                let dxP = player.x - e.x;
                let dzP = player.z - e.z;
                let distToPlayer = Math.hypot(dxP, dzP);

                if (e.isBoss) {
                    // --- HEX-CORE BOSS AI ---
                    let len = Math.max(1, distToPlayer);
                    
                    // Slow Pursuit Pursuit: Boss slowly follows the player to enable luring tactics
                    let pursuitSpeed = e.speed * 1.5; // Slightly faster follow
                    if (distToPlayer > 1000) {
                        tryMove(e, (dxP/len) * pursuitSpeed * dt, (dzP/len) * pursuitSpeed * dt);
                    } else if (distToPlayer < 600) {
                        // Maintain some distance if too close
                        tryMove(e, (-dxP/len) * pursuitSpeed * dt, (-dzP/len) * pursuitSpeed * dt);
                    }

                    e.stateTimer -= dt;
                    if (e.stateTimer <= 0) {
                        let activeLaunchers = enemies.filter(other => other.type === 'launcher' && other.squadId === e.bossId).length;
                        
                        if (activeLaunchers === 0) {
                            // SILENCED STATE: Only slow emergency defense shots
                            sfxFire();
                            let shootDist = Math.max(1, distToPlayer);
                            enemyProjectiles.push({
                                x: e.x, y: e.y + 50, z: e.z,
                                vx: (dxP/shootDist) * 400, vy: 0, vz: (dzP/shootDist) * 400,
                                time: 0, maxTime: 5
                            });
                            e.stateTimer = 4.0;
                        } else if (distToPlayer > 2000) {
                            // Long Range: Plasma Barrage
                            sfxFire();
                            let missileCount = Math.floor(activeLaunchers * 1.5); // Scaled to launchers
                            let spiralOffset = performance.now() * 0.002;
                            for (let k = 0; k < missileCount; k++) {
                                let mAng = (k / missileCount) * Math.PI * 2 + spiralOffset;
                                let shootDist = Math.max(1, distToPlayer);
                                enemyProjectiles.push({
                                    x: e.x + Math.cos(mAng) * 250, y: e.y + 120, z: e.z + Math.sin(mAng) * 250,
                                    vx: (dxP/shootDist) * 700 + Math.cos(mAng)*300, 
                                    vy: 350 + Math.random()*250, 
                                    vz: (dzP/shootDist) * 700 + Math.sin(mAng)*300,
                                    time: 0, maxTime: 14.0, isPlasma: true
                                });
                            }
                            e.stateTimer = 2.0 + (6 - activeLaunchers) * 0.5;
                        } else {
                            // Close Range: Needle Spread
                            sfxFire();
                            let shootDist = Math.max(1, distToPlayer);
                            let count = activeLaunchers * 2; // Scaled to launchers
                            for(let j=0; j<count; j++) {
                                let ang = (j/count) * Math.PI*2 + (Math.random()-0.5)*0.5;
                                enemyProjectiles.push({
                                    x: e.x, y: e.y + 50, z: e.z,
                                    vx: (dxP/shootDist) * 1100 + Math.cos(ang)*400,
                                    vy: (player.y - e.y)/shootDist * 1100 + (Math.random()-0.5)*300,
                                    vz: (dzP/shootDist) * 1100 + Math.sin(ang)*400,
                                    time: 0, maxTime: 5
                                });
                            }
                            e.stateTimer = 1.0 + (6 - activeLaunchers) * 0.2;
                        }
                    }
                } else if (e.type === 'interceptor') {
                    // New Interceptor AI: High speed approach, flee when low health
                    let len = Math.max(1, distToPlayer);
                    if (e.hp <= 2) {
                        // FLEEING STATE
                        e.speed = 600 + (gameState.level * 25); // Faster when fleeing
                        tryMove(e, (-dxP/len) * e.speed * dt, (-dzP/len) * e.speed * dt);
                        if (Math.random() < 0.1) {
                            particles.push({
                                x: e.x, y: e.y, z: e.z, vx: 0, vy: 50, vz: 0,
                                time: 0.3, maxTime: 0.3, color: '#ff8', size: 20
                            });
                        }
                    } else if (distToPlayer > 600) {
                        tryMove(e, (dxP/len) * e.speed * dt, (dzP/len) * e.speed * dt);
                    } else {
                        // strafe
                        tryMove(e, (dzP/len) * e.speed * dt, (-dxP/len) * e.speed * dt);
                        e.stateTimer -= dt;
                        if (e.stateTimer <= 0) {
                            sfxFire();
                            enemyProjectiles.push({
                                x: e.x, y: e.y, z: e.z, vx: (dxP/len)*1100, vy: 0, vz: (dzP/len)*1100, time: 0
                            });
                            e.stateTimer = 1.0;
                        }
                    }
                } else if (e.type === 'launcher') {
                    // Core Launchers orbit the boss
                    let boss = enemies.find(b => b.isBoss && b.bossId === e.squadId);
                    if (boss) {
                        e.orbitAngle += dt * 0.6; // Speed of rotation around boss
                        let targetX = boss.x + Math.cos(e.orbitAngle) * 400;
                        let targetZ = boss.z + Math.sin(e.orbitAngle) * 400;
                        e.x += (targetX - e.x) * dt * 3;
                        e.z += (targetZ - e.z) * dt * 3;
                        e.y = boss.y + 80;
                    } else {
                        // Boss is gone; these self-destruct or flee
                        e.hp = 0;
                    }
                } else if (e.type === 'escort') {
                    // Escort drones orbit the boss or intercept player if close
                    let boss = enemies.find(b => b.isBoss && b.bossId === e.squadId);
                    if (boss) {
                        e.orbitAngle += dt * 1.5;
                        let tx = boss.x + Math.cos(e.orbitAngle) * 450;
                        let tz = boss.z + Math.sin(e.orbitAngle) * 450;
                        e.x += (tx - e.x) * dt * 3;
                        e.z += (tz - e.z) * dt * 3;
                        e.y = boss.y + 100 + Math.sin(performance.now()*0.005 + e.orbitAngle)*30;
                        
                        // Fire at player if within range
                        if (distToPlayer < 1200) {
                            e.stateTimer -= dt;
                            if (e.stateTimer <= 0) {
                                sfxFire();
                                let pLen = Math.hypot(dxP, dzP);
                                enemyProjectiles.push({
                                    x: e.x, y: e.y, z: e.z,
                                    vx: (dxP/pLen) * 900, vy: (player.y - e.y)/pLen * 900, vz: (dzP/pLen) * 900,
                                    time: 0
                                });
                                e.stateTimer = 3.0;
                            }
                        }
                    } else {
                        e.hp = 0; // Boss dead, escorts die
                    }
                } else if (e.state === 'approach') {
                    // move towards player 360 degrees
                    let len = Math.max(1, distToPlayer);
                    tryMove(e, (dxP/len) * e.speed * dt, (dzP/len) * e.speed * dt);
                    
                    let engageDist = e.isBoss ? 900 : (e.type === 'missiler' ? baseEngageDist : 600);
                    if (distToPlayer < engageDist) {
                        e.state = 'aim';
                        e.stateTimer = 1.0 + Math.random() * 0.5;
                    }
                } else if (e.state === 'aim') {
                    // drift towards player slowly
                    let len = Math.max(1, distToPlayer);
                    tryMove(e, (dxP/len) * (e.speed * 0.3) * dt, (dzP/len) * (e.speed * 0.3) * dt);
                    
                    e.stateTimer -= dt;
                    // Telegraph aim
                    if (Math.random() < 0.2) {
                        particles.push({
                            x: e.x, y: e.y + (e.isBoss ? 40 : -10), z: e.z, vx: 0, vy: 0, vz: 0,
                            time: 0.1, maxTime: 0.1, color: 'rgba(150, 150, 150, 0.5)', size: e.isBoss ? 150 : 40, isRing: true
                        });
                    }
                    if (e.stateTimer <= 0) {
                        e.state = 'fire';
                        
                        let dyP = player.y - e.y;
                        let pLen = Math.hypot(dxP, dyP, dzP);

                        if (e.isBoss) {
                            // Boss fires a spread pattern
                            sfxFire(); 
                            for(let bang= -2; bang <= 2; bang++) {
                                let ang = bang * 0.15;
                                let cosA = Math.cos(ang), sinA = Math.sin(ang);
                                let vx = (dxP/pLen) * cosA - (dzP/pLen) * sinA;
                                let vz = (dxP/pLen) * sinA + (dzP/pLen) * cosA;
                                enemyProjectiles.push({
                                    x: e.x, y: e.y + 20, z: e.z,
                                    vx: vx * 900, vy: (dyP/pLen) * 900, vz: vz * 900, time: 0
                                });
                            }
                            e.stateTimer = 4.0;
                        } else if (e.type === 'missiler') {
                            let patrolAliveInSquad = enemies.some(other => other.squadId === e.squadId && other.type === 'patrol');
                            sfxFire();
                            
                            if (patrolAliveInSquad) {
                                // Has patrol support: Heavy Missiles
                                for(let k=0; k<missilerAmmo; k++) {
                                    let spreadX = (Math.random() - 0.5) * 400;
                                    let spreadZ = (Math.random() - 0.5) * 400;
                                    enemyProjectiles.push({
                                        x: e.x, y: e.y, z: e.z,
                                        vx: (dxP/pLen) * 800 + spreadX, vy: (dyP/pLen) * 800 + 400, vz: (dzP/pLen) * 800 + spreadZ,
                                        time: 0
                                    });
                                }
                            } else {
                                // No patrols left: Downgrade to standard shots
                                for(let bang= -1; bang <= 1; bang++) {
                                    let ang = bang * 0.1;
                                    let cosA = Math.cos(ang), sinA = Math.sin(ang);
                                    let vx = (dxP/pLen) * cosA - (dzP/pLen) * sinA;
                                    let vz = (dxP/pLen) * sinA + (dzP/pLen) * cosA;
                                    enemyProjectiles.push({
                                        x: e.x, y: e.y, z: e.z,
                                        vx: vx * 1000, vy: (dyP/pLen) * 1000, vz: vz * 1000, time: 0
                                    });
                                }
                            }
                            e.stateTimer = 4.0 + Math.random(); 
                        } else if (e.type === 'gunner') {
                            sfxFire();
                            for(let bang= -1; bang <= 1; bang++) {
                                let ang = bang * 0.2;
                                let cosA = Math.cos(ang), sinA = Math.sin(ang);
                                let vx = (dxP/pLen) * cosA - (dzP/pLen) * sinA;
                                let vz = (dxP/pLen) * sinA + (dzP/pLen) * cosA;
                                enemyProjectiles.push({
                                    x: e.x, y: e.y, z: e.z,
                                    vx: vx * 1200, vy: (dyP/pLen) * 1200, vz: vz * 1200, time: 0
                                });
                            }
                            e.stateTimer = 2.5 + Math.random(); 
                        } else if (e.type === 'patrol') {
                            enemyProjectiles.push({
                                x: e.x, y: e.y, z: e.z,
                                vx: (dxP/pLen) * 500, vy: (dyP/pLen) * 500, vz: (dzP/pLen) * 500,
                                time: 0
                            });
                            e.stateTimer = 4.0; 
                        }
                    }
                } else if (e.state === 'fire') {
                    // post-fire drift
                    e.stateTimer -= dt;
                    if (e.stateTimer <= 0) {
                        e.state = 'approach';
                    }
                }
                
                // collision with player (physical body ram)
                if (distToPlayer < e.radius + player.radius) {
                    if (player.dashTimer <= 0) {
                        gameState.playerHP -= e.isBoss ? 40 : 20;
                        updateHP();
                        shakeCamera(0.5, 20);
                    }
                    if (e.isBoss) {
                        // Boss takes minor contact damage instead of instant death
                        e.hp -= 10;
                        // Push player back
                        let pushDist = Math.max(1, distToPlayer);
                        tryMove(player, (dxP/pushDist) * -300, (dzP/pushDist) * -300);
                    } else {
                        createExplosion(e.x, e.y, e.z);
                        enemies.splice(i, 1);
                        continue;
                    }
                }

                let distCam = Math.hypot(e.x - world.camera.x, e.z - world.camera.z);
                let maxDist = e.isBoss ? 8000 : 3000;
                if (distCam > maxDist) {
                    enemies.splice(i, 1);
                }
            }

            // Enemy Projectiles
            for (let i = enemyProjectiles.length - 1; i >= 0; i--) {
                let ep = enemyProjectiles[i];
                ep.time += dt;
                ep.x += ep.vx * dt;
                ep.y += ep.vy * dt;
                ep.z += ep.vz * dt;

                // draw a red trail
                for (let k=0; k<2; k++) {
                    particles.push({
                        x: ep.x + (Math.random()-0.5)*10, y: ep.y + (Math.random()-0.5)*10, z: ep.z + (Math.random()-0.5)*10,
                        vx: (Math.random()-0.5)*100, vy: (Math.random()-0.5)*100, vz: (Math.random()-0.5)*100,
                        time: 0.2 + Math.random()*0.2, maxTime: 0.4, color: '#ff6600', size: 5 + Math.random()*10
                    });
                }

                // hit player
                let dist = Math.hypot(ep.x - player.x, ep.y - player.y, ep.z - player.z);
                if (dist < 30) {
                    if (player.dashTimer <= 0) {
                        gameState.playerHP -= 15;
                        updateHP();
                        shakeCamera(0.3, 15);
                        createExplosion(ep.x, ep.y, ep.z, 0.5, '#f00');
                    }
                    enemyProjectiles.splice(i, 1);
                    continue;
                }

                // timeout (Remove Z-check to allow missiles from behind/sides to persist)
                let maxT = ep.maxTime || 4;
                if (ep.time > maxT) {
                    enemyProjectiles.splice(i, 1);
                }
            }

            // Missiles
            for (let i = missiles.length - 1; i >= 0; i--) {
                let m = missiles[i];
                m.time += dt;
                
                if (m.trail) {
                    m.trail.push({x: m.x, y: m.y, z: m.z});
                    if (m.trail.length > 30) m.trail.shift(); // Longer, more dramatic trail
                }

                // If target is dead or disappeared, just fly straight
                let hasTarget = enemies.includes(m.tObj);
                
                if (hasTarget) {
                    let dx = m.tObj.x - m.x;
                    let dy = m.tObj.y - m.y;
                    let dz = m.tObj.z - m.z;
                    let dist = Math.hypot(dx, dy, dz);

                    // Phase 10: Enemy Dash Evasion (Reduced chance to increase hit rate)
                    if (dist < 200 && m.tObj.dashCooldown <= 0 && Math.random() < 0.1) {
                        // Dash perpendicular to missile's incoming direction (XZ plane)
                        let perpX = -dz / dist;
                        let perpZ = dx / dist;
                        let dashMag = 250 + Math.random() * 150;
                        let side = Math.random() < 0.5 ? 1 : -1;
                        m.tObj.x += perpX * dashMag * side;
                        m.tObj.z += perpZ * dashMag * side;
                        m.tObj.dashCooldown = 1.5; // 1.5s cooldown
                    }
                    
                    // Missile Interception removed as per user request (was making hits too difficult)
                    
                    if (dist < (m.tObj.radius || 25) + 20) { // hit radius tuned to target size
                        // Mechanics Update: Height Advantage Damage Calculation
                        let heightDiff = Math.max(0, m.startY - m.tObj.y);
                        let damage = 1;
                        let heightBonus = heightDiff / 100; // e.g., 200 height = +2 dmg
                        damage += heightBonus;

                        createExplosion(m.tObj.x, m.tObj.y, m.tObj.z, 1.0 + (heightBonus * 0.4), heightBonus >= 1.5 ? '#aaa' : null);

                        m.tObj.hp -= damage;
                        if (m.tObj.hp <= 0) {
                            let eIdx = enemies.indexOf(m.tObj);
                            if (eIdx !== -1) {
                                let enObj = enemies[eIdx];
                                enemies.splice(eIdx, 1);
                                
                                // Spawn Data Core(s)
                                let coreYield = enObj.isBoss ? 20 : 1;
                                for(let k=0; k<coreYield; k++) {
                                    dataCores.push({
                                        x: enObj.x + (Math.random()-0.5)*100,
                                        y: enObj.y,
                                        z: enObj.z + (Math.random()-0.5)*100,
                                        isBossObj: enObj.isBoss,
                                        time: 0, // Initialize time for magnet pull logic
                                        lifetime: enObj.isBoss ? 12 : 8 // seconds before disappearing
                                    });
                                }
                                
                                if (enObj.isBoss) {
                                    gameState.bossActive = false;
                                    createExplosion(enObj.x, enObj.y, enObj.z, 4.0, '#888');
                                    shakeCamera(1.5, 20);
                                    // advance level safely past the % 5 mark instantly
                                    addExp(1000); 
                                    gameState.score += 5000;
                                }

                                comboCount++;
                                comboTimer = 2.0;
                                let scoreGain = 10 * comboCount; // Reduced direct score, gems give the rest
                                gameState.score += scoreGain;
                                
                                document.getElementById('scoreVal').innerText = gameState.score;
                                
                                if (comboCount > 1) {
                                    let cText = document.getElementById('comboText');
                                    cText.innerText = `${comboCount}x COMBO!`;
                                    cText.style.opacity = '1';
                                    cText.style.transform = `scale(${1 + comboCount*0.1})`;
                                    setTimeout(() => cText.style.transform = 'scale(1)', 100);
                                }
                                shakeCamera(0.2, 5 + comboCount * 2);
                            }
                        }
                        missiles.splice(i, 1);
                        continue;
                    }

                    // Steer towards target: "Itano Circus" realistic homing
                    let speed = 1200; // max missile flying speed
                    let turnRate = Math.min(8, m.time * 4); // turn rate increases intensely over time
                    
                    let nx = (dx / dist) * speed;
                    let ny = (dy / dist) * speed;
                    let nz = (dz / dist) * speed;
                    
                    m.vx += (nx - m.vx) * turnRate * dt;
                    m.vy += (ny - m.vy) * turnRate * dt;
                    m.vz += (nz - m.vz) * turnRate * dt;
                } else {
                    // target lost, keep current velocity but add gravity
                    m.vy -= 400 * dt; 
                }
                
                m.x += m.vx * dt;
                m.y += m.vy * dt;
                m.z += m.vz * dt;

                let groundY = getTerrainHeight(m.x, m.z);
                // Time out or hit mountain Early
                if (m.y < groundY - 20) {
                     createExplosion(m.x, m.y, m.z, 0.5, '#aaa'); // premature mountain explosion
                     missiles.splice(i, 1);
                     continue;
                }
                
                // Absolute timeout
                if (m.time > 5 || m.z < world.camera.z - 1000) {
                     missiles.splice(i, 1);
                     continue;
                }

                // Trail sparks
                if (Math.random() < 0.5) {
                    particles.push({
                        x: m.x + (Math.random()-0.5)*10, y: m.y, z: m.z,
                        vx: 0, vy: 0, vz: 0,
                        time: 0.15, maxTime: 0.15, color: '#ffaa00', size: 10
                    });
                }
            }

            updateParticles(dt);
        }

        function updateParticles(dt) {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.time -= dt;
                if (p.time <= 0) {
                    particles.splice(i, 1);
                } else {
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                    p.z += p.vz * dt;
                    // gravity
                    if (!p.isFlash && !p.isRing) p.vy -= 800 * dt; 
                }
            }
        }

        // ---- Rendering ----

        function drawTerrain() {
            ctx.lineWidth = 1;

            let camCellX = Math.floor(world.camera.x / tSize);
            let camCellZ = Math.floor(world.camera.z / tSize);
            
            let polys = [];

            // Generate polygon data for visible cells
            for (let x = camCellX - tViewRadius; x <= camCellX + tViewRadius; x++) {
                for (let z = camCellZ - tViewRadius; z <= camCellZ + tViewRadius; z++) {
                    let wx = x * tSize;
                    let wz = z * tSize;

                    let h11 = getTerrainHeight(wx, wz);
                    let h12 = getTerrainHeight(wx + tSize, wz);
                    let h21 = getTerrainHeight(wx, wz + tSize);
                    let h22 = getTerrainHeight(wx + tSize, wz + tSize);

                    let p11 = project(wx, h11, wz);
                    let p12 = project(wx + tSize, h12, wz);
                    let p21 = project(wx, h21, wz + tSize);
                    let p22 = project(wx + tSize, h22, wz + tSize);

                    // Skip polygons entirely behind camera
                    if (p11.z < 0 && p12.z < 0 && p21.z < 0 && p22.z < 0) continue; 

                    let dist = Math.hypot((wx + tSize/2) - world.camera.x, (wz + tSize/2) - world.camera.z);
                    let maxDist = tViewRadius * tSize;
                    let fog = Math.max(0, Math.min(1, 1 - (dist / maxDist)));
                    if (fog <= 0.05) continue; 

                    let avgH1 = (h11 + h12 + h21) / 3;
                    let avgH2 = (h12 + h22 + h21) / 3;
                    
                    let baseColH1 = 200 + Math.min(40, avgH1 / 10);
                    let baseColH2 = 200 + Math.min(40, avgH2 / 10);

                    polys.push({
                         zDepth: p11.z + p12.z + p21.z, // Approx depth
                         draw: function() {
                             // Tri 1
                             ctx.fillStyle = `rgba(${baseColH1-10}, ${baseColH1}, ${baseColH1+30}, ${fog})`;
                             ctx.strokeStyle = `rgba(0, 150, 255, ${fog * 0.2})`;
                             ctx.beginPath();
                             ctx.moveTo(p11.x, p11.y);
                             ctx.lineTo(p12.x, p12.y);
                             ctx.lineTo(p21.x, p21.y);
                             ctx.closePath();
                             ctx.fill(); ctx.stroke();
                         }
                    });
                    
                    polys.push({
                         zDepth: p12.z + p22.z + p21.z,
                         draw: function() {
                             // Tri 2
                              ctx.fillStyle = `rgba(${baseColH2-10}, ${baseColH2-5}, ${baseColH2+20}, ${fog})`;
                             ctx.beginPath();
                             ctx.moveTo(p12.x, p12.y);
                             ctx.lineTo(p22.x, p22.y);
                             ctx.lineTo(p21.x, p21.y);
                             ctx.closePath();
                             ctx.fill(); ctx.stroke();
                         }
                    });
                }
            }
            
            // Painter's Algorithm: Sort back to front (highest zDepth to lowest)
            polys.sort((a,b) => b.zDepth - a.zDepth);
            for(let p of polys) p.draw();
        }

        function drawPlayer(proj) {
            let s = proj.scale * player.radius;
            ctx.save();
            ctx.translate(proj.x, proj.y);
            
            // Tilt based on movement
            let tilt = (keys.d ? 1 : 0) - (keys.a ? 1 : 0) + joyInput.x;
            ctx.rotate(tilt * 0.4);

            let tTime = performance.now() * 0.015;
            let speed = Math.abs(tilt) + (keys.w || keys.s || joyInput.y !== 0 ? 1 : 0);
            let walkCycle = speed > 0 ? tTime : 0;

            // Shadow
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.beginPath(); ctx.ellipse(0, s*1.5, s*2, s*0.6, 0, 0, Math.PI*2); ctx.fill();

            // Legs (4 legs - Square Pyramids)
            let legBases = [
                {x: -s*0.8, y: s*0.2, phase: 0},
                {x: s*0.8, y: s*0.2, phase: Math.PI},
                {x: -s*0.8, y: s*0.6, phase: Math.PI},
                {x: s*0.8, y: s*0.6, phase: 0}
            ];

            // Helper to draw a square pyramid pointing from top center to a base
            function drawPyramidLeg(startX, startY, endX, endY, width, colDark, colLight) {
                // Front / Right face
                ctx.fillStyle = colLight;
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.lineTo(endX + width/2, endY);
                ctx.lineTo(endX, endY + width/2);
                ctx.closePath();
                ctx.fill(); ctx.stroke();
                
                // Back / Left face
                ctx.fillStyle = colDark;
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.lineTo(endX, endY + width/2);
                ctx.lineTo(endX - width/2, endY);
                ctx.closePath();
                ctx.fill(); ctx.stroke();
            }

            ctx.strokeStyle = '#0df';
            ctx.lineWidth = 1;
            ctx.lineJoin = 'round';

            // Draw back legs first
            for (let i=0; i<4; i++) {
                let leg = legBases[i];
                let isFront = i >= 2;
                if (isFront) continue; // draw back only
                
                let lift = Math.sin(walkCycle + leg.phase);
                let stepX = Math.cos(walkCycle + leg.phase) * s * 0.6;
                let j1x = leg.x + (leg.x < 0 ? -s*0.6 : s*0.6);
                let j1y = leg.y - s*0.5;
                let footX = leg.x + (leg.x < 0 ? -s*1.2 : s*1.2) + stepX;
                let footY = leg.y + s*1.2 - Math.max(0, lift * s * 0.6);

                // Upper leg segment (inverted pyramid)
                drawPyramidLeg(leg.x, leg.y, j1x, j1y, s*0.4, '#035', '#06a');
                // Lower leg segment
                drawPyramidLeg(j1x, j1y, footX, footY, s*0.2, '#024', '#048');
            }

            // Body (Square Pyramid Base pointing up)
            ctx.fillStyle = '#055';
            ctx.strokeStyle = '#0df';
            ctx.lineWidth = 1.5;
            
            // Left face
            ctx.fillStyle = '#034';
            ctx.beginPath();
            ctx.moveTo(0, -s*1.5); // Apex
            ctx.lineTo(-s*1.2, 0); // Left corner
            ctx.lineTo(0, s*0.5); // Bottom center
            ctx.closePath();
            ctx.fill(); ctx.stroke();
            
            // Right face
            ctx.fillStyle = '#ddd';
            ctx.beginPath();
            ctx.moveTo(0, -s*1.5); // Apex
            ctx.lineTo(0, s*0.5); // Bottom center
            ctx.lineTo(s*1.2, 0); // Right corner
            ctx.closePath();
            ctx.fill(); ctx.stroke();

            // Cockpit Window
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.moveTo(0, -s*0.5);
            ctx.lineTo(-s*0.3, -s*0.1);
            ctx.lineTo(0, s*0.1);
            ctx.lineTo(s*0.3, -s*0.1);
            ctx.closePath();
            ctx.fill();

            // Draw front legs
            for (let i=0; i<4; i++) {
                let leg = legBases[i];
                let isFront = i >= 2;
                if (!isFront) continue; // draw front only
                
                let lift = Math.sin(walkCycle + leg.phase);
                let stepX = Math.cos(walkCycle + leg.phase) * s * 0.6;
                let j1x = leg.x + (leg.x < 0 ? -s*0.6 : s*0.6);
                let j1y = leg.y - s*0.5;
                let footX = leg.x + (leg.x < 0 ? -s*1.2 : s*1.2) + stepX;
                let footY = leg.y + s*1.2 - Math.max(0, lift * s * 0.6);

                // Upper leg
                drawPyramidLeg(leg.x, leg.y, j1x, j1y, s*0.4, '#035', '#06a');
                // Lower leg
                drawPyramidLeg(j1x, j1y, footX, footY, s*0.2, '#024', '#048');
            }

            ctx.restore();
        }

        function drawEnemy(proj, en) {
            let isBoss = en.isBoss;
            let s = proj.scale * en.radius * (isBoss ? 1 : 1.4);
            ctx.save();
            ctx.translate(proj.x, proj.y);

            let tTime = performance.now() * 0.015;
            let walkCycle = tTime * (en.speed / 200);

            // Shadow
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.beginPath(); ctx.ellipse(0, s*1.8, s*2.5, s*0.8, 0, 0, Math.PI*2); ctx.fill();

            if (en.isBoss) {
                // --- HEX-CORE OBLITERATOR BOSS VISUALS ---
                let activeLaunchers = enemies.filter(other => other.type === 'launcher' && other.squadId === en.bossId).length;
                let corePulse = 0.8 + 0.2 * Math.sin(performance.now() * 0.005);
                
                // Central Core
                let coreGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, s*0.8);
                coreGrad.addColorStop(0, '#fff');
                coreGrad.addColorStop(0.2, '#0ff');
                coreGrad.addColorStop(1, 'rgba(0,150,255,0)');
                ctx.fillStyle = coreGrad;
                ctx.beginPath();
                ctx.arc(0, 0, s * corePulse, 0, Math.PI*2);
                ctx.fill();

                // Rotating Hex Plates
                let plates = 6;
                let bRot = performance.now() * 0.001;
                for (let i = 0; i < plates; i++) {
                    let ang = (i / plates) * Math.PI * 2 + bRot;
                    let px = Math.cos(ang) * s * 2.5;
                    let py = Math.sin(ang) * s * 2.5;
                    
                    ctx.save();
                    ctx.translate(px, py);
                    ctx.rotate(ang + Math.PI/2);
                    
                    ctx.fillStyle = (i < activeLaunchers) ? '#222' : '#111';
                    ctx.strokeStyle = (i < activeLaunchers) ? '#0df' : '#444';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    for(let k=0; k<6; k++) {
                        let hang = (k/6) * Math.PI*2;
                        let hx = Math.cos(hang)*s*0.8;
                        let hy = Math.sin(hang)*s*0.8;
                        if(k===0) ctx.moveTo(hx, hy); else ctx.lineTo(hx, hy);
                    }
                    ctx.closePath();
                    ctx.fill(); ctx.stroke();
                    
                    if (Math.random() < 0.2) {
                        ctx.fillStyle = '#0ff';
