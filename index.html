                        ctx.beginPath(); ctx.arc(0, 0, s*0.2, 0, Math.PI*2); ctx.fill();
                    }
                    ctx.restore();
                    
                    ctx.strokeStyle = 'rgba(0, 255, 255, 0.2)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.lineTo(px, py);
                    ctx.stroke();
                }
            } else if (en.type === 'launcher') {
                let sL = s * 0.8;
                ctx.fillStyle = '#111'; ctx.strokeStyle = '#0ff'; ctx.lineWidth = 3;
                ctx.beginPath();
                for(let k=0; k<6; k++) {
                    let a = (k/6)*Math.PI*2;
                    ctx.lineTo(Math.cos(a)*sL, Math.sin(a)*sL);
                }
                ctx.closePath(); ctx.fill(); ctx.stroke();
                ctx.fillStyle = '#0ff'; ctx.globalAlpha = 0.5 + Math.sin(performance.now()*0.01)*0.3;
                ctx.beginPath(); ctx.arc(0,0, sL*0.4, 0, Math.PI*2); ctx.fill();
                ctx.globalAlpha = 1.0;
            } else if (en.type === 'interceptor') {
                let sI = s * 1.2;
                ctx.fillStyle = '#300'; ctx.strokeStyle = '#f22'; ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(0, -sI); ctx.lineTo(sI*0.5, sI*0.8); ctx.lineTo(0, sI*0.4); ctx.lineTo(-sI*0.5, sI*0.8);
                ctx.closePath(); ctx.fill(); ctx.stroke();
                ctx.fillStyle = '#f22'; ctx.beginPath(); ctx.arc(0, 0, sI*0.2, 0, Math.PI*2); ctx.fill();
            } else if (en.type === 'escort') {
                let sD = s * 0.8;
                ctx.fillStyle = '#055'; ctx.strokeStyle = '#0df'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(0, -sD); ctx.lineTo(sD, sD); ctx.lineTo(-sD, sD); ctx.closePath(); ctx.fill(); ctx.stroke();
                ctx.fillStyle = '#0df'; ctx.beginPath(); ctx.arc(0, 0, sD*0.3, 0, Math.PI*2); ctx.fill();
            } else {
                // --- Standard Enemy ---
                let typeColor = en.type === 'missiler' ? {d: '#400', l: '#800', bodyD: '#300', bodyL: '#600', bodyT: '#822'} 
                              : en.type === 'gunner' ? {d: '#440', l: '#880', bodyD: '#330', bodyL: '#660', bodyT: '#882'}
                              : {d: '#040', l: '#080', bodyD: '#030', bodyL: '#060', bodyT: '#282'};

                let darkColor = en.targeted ? '#800' : typeColor.d;
                let lightColor = en.targeted ? '#f55' : typeColor.l;

                function dPL(startX, startY, endX, endY, width, colDark, colLight) {
                    ctx.fillStyle = colLight; ctx.beginPath(); ctx.moveTo(startX, startY); ctx.lineTo(endX + width/2, endY); ctx.lineTo(endX, endY + width/2); ctx.closePath(); ctx.fill(); ctx.stroke();
                    ctx.fillStyle = colDark; ctx.beginPath(); ctx.moveTo(startX, startY); ctx.lineTo(endX, endY + width/2); ctx.lineTo(endX - width/2, endY); ctx.closePath(); ctx.fill(); ctx.stroke();
                }

                let lB = [
                    {x: -s*0.8, y: -s*0.2, phase: 0}, {x: s*0.8, y: -s*0.2, phase: Math.PI},
                    {x: -s*1.2, y: s*0.4, phase: Math.PI*0.66}, {x: s*1.2, y: s*0.4, phase: Math.PI*1.66},
                    {x: -s*0.9, y: s*0.8, phase: Math.PI*1.33}, {x: s*0.9, y: s*0.8, phase: Math.PI*0.33}
                ];

                for (let i=0; i<2; i++) {
                    let leg = lB[i]; let lift = Math.sin(walkCycle + leg.phase); let stepY = Math.cos(walkCycle + leg.phase) * s * 0.5;
                    let j1x = leg.x + Math.sign(leg.x)*s*0.8; let j1y = leg.y - s*0.8;
                    let fX = leg.x + Math.sign(leg.x)*s*1.6; let fY = leg.y + s*1.2 + stepY - Math.max(0, lift*s*0.6);
                    dPL(leg.x, leg.y, j1x, j1y, s*0.4, darkColor, lightColor); dPL(j1x, j1y, fX, fY, s*0.2, darkColor, lightColor);
                }
                ctx.fillStyle = en.targeted ? '#b00' : typeColor.bodyD;
                ctx.beginPath(); ctx.moveTo(0, -s*1.2); ctx.lineTo(-s*1.5, -s*0.6); ctx.lineTo(-s*1.5, s*0.8); ctx.lineTo(0, s*1.0); ctx.closePath(); ctx.fill(); ctx.stroke();
                ctx.fillStyle = en.targeted ? '#f55' : typeColor.bodyL;
                ctx.beginPath(); ctx.moveTo(0, -s*1.2); ctx.lineTo(s*1.5, -s*0.6); ctx.lineTo(s*1.5, s*0.8); ctx.lineTo(0, s*1.0); ctx.closePath(); ctx.fill(); ctx.stroke();
                ctx.fillStyle = en.targeted ? '#f88' : typeColor.bodyT;
                ctx.beginPath(); ctx.moveTo(0, -s*1.2); ctx.lineTo(-s*1.5, -s*0.6); ctx.lineTo(0, -s*0.8); ctx.lineTo(s*1.5, -s*0.6); ctx.closePath(); ctx.fill(); ctx.stroke();
                
                for (let i=2; i<6; i++) {
                    let leg = lB[i]; let lift = Math.sin(walkCycle + leg.phase); let stepY = Math.cos(walkCycle + leg.phase) * s * 0.5;
                    let j1x = leg.x + Math.sign(leg.x)*s*0.8; let j1y = leg.y - s*0.8;
                    let fX = leg.x + Math.sign(leg.x)*s*1.6; let fY = leg.y + s*1.2 + stepY - Math.max(0, lift*s*0.6);
                    dPL(leg.x, leg.y, j1x, j1y, s*0.4, darkColor, lightColor); dPL(j1x, j1y, fX, fY, s*0.2, darkColor, lightColor);
                }

                if (en.type === 'missiler') {
                    let pS = s * 0.4; let pH = -s * 2.2; let offs = [{x: -s*0.5, y: -s*1.0}, {x: s*0.5, y: -s*1.0}, {x: -s*0.5, y: -s*1.5}, {x: s*0.5, y: -s*1.5}];
                    for (let p of offs) {
                        ctx.fillStyle = '#111'; ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x - pS, p.y + pS*0.5); ctx.lineTo(p.x - pS, pH + pS*0.5); ctx.lineTo(p.x, pH); ctx.closePath(); ctx.fill(); ctx.stroke();
                        ctx.fillStyle = '#300'; ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x + pS, p.y + pS*0.5); ctx.lineTo(p.x + pS, pH + pS*0.5); ctx.lineTo(p.x, pH); ctx.closePath(); ctx.fill(); ctx.stroke();
                        ctx.fillStyle = '#500'; ctx.beginPath(); ctx.moveTo(p.x, pH); ctx.lineTo(p.x - pS, pH + pS*0.5); ctx.lineTo(p.x, pH + pS); ctx.lineTo(p.x + pS, pH + pS*0.5); ctx.closePath(); ctx.fill(); ctx.stroke();
                    }
                } else if (en.type === 'gunner') {
                    ctx.fillStyle = '#222'; ctx.fillRect(-s*1.2, -s*0.5, s*2.4, s*0.3); ctx.strokeRect(-s*1.2, -s*0.5, s*2.4, s*0.3);
                    ctx.fillStyle = '#550'; ctx.beginPath(); ctx.arc(0, -s*0.8, s*0.6, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                } else if (en.type === 'patrol') {
                    let spin = performance.now() * 0.005;
                    ctx.save(); ctx.translate(0, -s*1.6); ctx.rotate(spin);
                    ctx.fillStyle = '#0a0'; ctx.strokeStyle = '#0f0';
                    ctx.beginPath(); ctx.ellipse(0, 0, s*0.8, s*0.3, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                    ctx.beginPath(); ctx.arc(0, 0, s*0.2, 0, Math.PI*2); ctx.fillStyle = '#ff0'; ctx.fill();
                    ctx.restore();
                    ctx.fillStyle = '#111'; ctx.fillRect(-s*0.1, -s*1.6, s*0.2, s*0.6); ctx.strokeRect(-s*0.1, -s*1.6, s*0.2, s*0.6);
                }
                ctx.fillStyle = en.type === 'missiler' ? '#f00' : (en.type === 'gunner' ? '#ff0' : '#0f0');
                ctx.beginPath(); ctx.moveTo(-s*0.8, -s*0.2); ctx.lineTo(s*0.8, -s*0.2); ctx.lineTo(s*0.6, 0); ctx.lineTo(-s*0.6, 0); ctx.closePath(); ctx.fill();
            }

            // --- Shared Overlays ---
            let hpRatio = en.hp / en.maxHp;
            let barW = en.isBoss ? s*4 : s*2;
            let barH = en.isBoss ? 15 : s*0.1;
            let barY = en.isBoss ? -s*3.5 : -s*1.4;
            
            ctx.fillStyle = 'rgba(255,0,0,0.3)'; ctx.fillRect(-barW/2, barY, barW, barH);
            ctx.fillStyle = en.isBoss ? '#f00' : '#999'; ctx.fillRect(-barW/2, barY, barW * hpRatio, barH);
            ctx.strokeStyle = en.isBoss ? '#fff' : '#000'; ctx.strokeRect(-barW/2, barY, barW, barH);

            if (en.locks > 0) {
                let isMax = (en.locks >= (en.isBoss ? 15 : 4) || en.locks >= gameState.maxLocks);
                let boxSize = s * (en.isBoss ? 1.5 : 2.0);
                let tick = boxSize * 0.3;

                ctx.save();
                ctx.translate(0, -s * 0.5);

                if (isMax) {
                    let flash = Math.floor(performance.now() / 100) % 2 === 0;
                    ctx.strokeStyle = flash ? '#aff' : '#0df';
                    ctx.lineWidth = 4;
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#0df';
                } else {
                    ctx.strokeStyle = '#0df';
                    ctx.lineWidth = 2;
                    ctx.shadowBlur = 0;
                }

                ctx.beginPath();
                ctx.rect(-boxSize, -boxSize, boxSize * 2, boxSize * 2);
                ctx.moveTo(-boxSize, -boxSize); ctx.lineTo(boxSize, boxSize);
                ctx.moveTo(boxSize, -boxSize); ctx.lineTo(-boxSize, boxSize);
                ctx.moveTo(-boxSize, -boxSize + tick); ctx.lineTo(-boxSize, -boxSize); ctx.lineTo(-boxSize + tick, -boxSize);
                ctx.moveTo(boxSize - tick, -boxSize); ctx.lineTo(boxSize, -boxSize); ctx.lineTo(boxSize, -boxSize + tick);
                ctx.moveTo(boxSize, boxSize - tick); ctx.lineTo(boxSize, boxSize); ctx.lineTo(boxSize - tick, boxSize);
                ctx.moveTo(-boxSize + tick, boxSize); ctx.lineTo(-boxSize, boxSize); ctx.lineTo(-boxSize, boxSize - tick);
                ctx.stroke();

                ctx.restore();
            }
            ctx.restore();
        }

        function drawMissile(proj, m) {
            // Draw continuous trail
            if (m.trail && m.trail.length > 0) {
                ctx.beginPath();
                ctx.strokeStyle = 'rgba(255, 180, 50, 0.5)';
                ctx.lineWidth = Math.max(2, proj.scale * 6);
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                let first = true;
                for (let pos of m.trail) {
                    let pt = project(pos.x, pos.y, pos.z);
                    if (pt.z > 0) {
                        if (first) {
                            ctx.moveTo(pt.x, pt.y);
                            first = false;
                        } else {
                            ctx.lineTo(pt.x, pt.y);
                        }
                    }
                }
                if (!first) {
                    ctx.lineTo(proj.x, proj.y);
                    ctx.stroke();
                }
            }

            let s = proj.scale * 15;
            ctx.save();
            ctx.translate(proj.x, proj.y);
            
            // Calculate velocity vector in screen space for rotation
            let angle = 0;
            let vecProj = project(m.x + m.vx, m.y + m.vy, m.z + m.vz);
            if (vecProj.z > 0 && proj.z > 0) {
                let dx = vecProj.x - proj.x;
                let dy = vecProj.y - proj.y;
                if (Math.abs(dx) > 0.1 || Math.abs(dy) > 0.1) {
                    angle = Math.atan2(dy, dx) + Math.PI / 2;
                    m.lastAngle = angle;
                } else if (m.lastAngle !== undefined) {
                    angle = m.lastAngle;
                }
            } else if (m.lastAngle !== undefined) {
                angle = m.lastAngle;
            }
            
            ctx.rotate(angle); 

            ctx.lineWidth = 1;
            
            if (m.type === 0) {
                // Type A: Standard sleak dart
                ctx.fillStyle = '#ddd';
                ctx.strokeStyle = '#fff';
                ctx.beginPath();
                ctx.moveTo(0, -s*1.2); // nose
                ctx.lineTo(s*0.6, s*0.8); // right wing
                ctx.lineTo(0, s*0.4); // center back
                ctx.lineTo(-s*0.6, s*0.8); // left wing
                ctx.closePath();
                ctx.fill(); ctx.stroke();
            } else if (m.type === 1) {
                // Type B: Heavy wide pyramid
                ctx.fillStyle = '#fa0';
                ctx.strokeStyle = '#ff0';
                ctx.beginPath();
                ctx.moveTo(0, -s*1.4);
                ctx.lineTo(s*0.8, s*0.6);
                ctx.lineTo(-s*0.8, s*0.6);
                ctx.closePath();
                ctx.fill(); ctx.stroke();
                
                // inner detail
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.moveTo(0, -s*0.6);
                ctx.lineTo(s*0.3, s*0.3);
                ctx.lineTo(-s*0.3, s*0.3);
                ctx.closePath();
                ctx.fill();
            } else {
                // Type C: Cluster / Double fin
                ctx.fillStyle = '#f05';
                ctx.strokeStyle = '#faa';
                ctx.beginPath();
                ctx.moveTo(0, -s*1.3);
                ctx.lineTo(s*0.4, s*0.7);
                ctx.lineTo(0, s*0.9);
                ctx.lineTo(-s*0.4, s*0.7);
                ctx.closePath();
                ctx.fill(); ctx.stroke();
            }

            // Engine blast
            ctx.fillStyle = (Math.random() > 0.5) ? '#fff' : '#0df';
            ctx.beginPath();
            ctx.arc(0, s*0.8, s*0.3 + Math.random()*s*0.3, 0, Math.PI*2);
            ctx.fill();

            ctx.restore();
        }

        function drawParticle(proj, p) {
            if (p.isFlash || p.isRing) {
                ctx.globalAlpha = p.time / p.maxTime;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(proj.x, proj.y, proj.scale * p.size, 0, Math.PI*2);
                if (p.isRing) {
                    ctx.strokeStyle = p.color; ctx.lineWidth = 2; ctx.stroke();
                } else {
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
                return;
            }
            let s = proj.scale * p.size * (p.time / p.maxTime);
            ctx.globalAlpha = Math.max(0, p.time / p.maxTime);
            ctx.fillStyle = p.color;
            ctx.fillRect(proj.x - s/2, proj.y - s/2, s, s);
            ctx.globalAlpha = 1;
        }

        function drawPredictionArcs() {
            ctx.save();
            ctx.lineWidth = 1.5;
            ctx.setLineDash([10, 15]);
            let dashOffset = -performance.now() * 0.05;

            for (let en of enemies) {
                if (en.locks > 0) {
                    ctx.beginPath();
                    for (let i = 0; i < en.locks; i++) {
                        ctx.strokeStyle = `rgba(0, 255, 255, ${0.2 + (i * 0.15)})`;
                        ctx.lineDashOffset = dashOffset - (i * 20);
                        
                        let steps = 15;
                        let first = true;
                        let arcHeight = 300 + (i * 50); 
                        
                        for (let step = 0; step <= steps; step++) {
                            let origin = drones[i % drones.length];
                            let t = step / steps;
                            let px = origin.x + (en.x - origin.x) * t;
                            let pz = origin.z + (en.z - origin.z) * t;
                            let py = origin.y + (en.y - origin.y) * t + Math.sin(t * Math.PI) * arcHeight;
                            
                            if (t > 0 && t < 1) {
                                let spread = (i - (en.locks - 1)/2) * 80 * Math.sin(t * Math.PI);
                                px += spread;
                            }

                            let pProj = project(px, py, pz);
                            
                            if (pProj.z > 0) {
                                if (first) {
                                    ctx.moveTo(pProj.x, pProj.y);
                                    first = false;
                                } else {
                                    ctx.lineTo(pProj.x, pProj.y);
                                }
                            }
                        }
                        ctx.stroke();
                        ctx.beginPath(); 
                    }
                }
            }
            ctx.restore();
        }

        function drawDrone(proj, dObj) {
            let s = proj.scale * dObj.radius;
            ctx.save();
            ctx.translate(proj.x, proj.y);
            
            // Hover/Rotation
            let rot = performance.now() * 0.005;
            ctx.rotate(rot);

            ctx.fillStyle = '#0df';
            ctx.beginPath();
            ctx.moveTo(0, -s);
            ctx.lineTo(s*0.866, s*0.5);
            ctx.lineTo(-s*0.866, s*0.5);
            ctx.fill();
            
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            ctx.restore();
        }

        function draw() {
            // Apply Screen Shake
            let shakeX = 0, shakeY = 0;
            if (screenShake.time > 0) {
                shakeX = (Math.random() - 0.5) * screenShake.intensity;
                shakeY = (Math.random() - 0.5) * screenShake.intensity;
            }

            // Background
            ctx.fillStyle = '#020205';
            ctx.fillRect(0, 0, width, height);

            ctx.save();
            ctx.translate(shakeX, shakeY);

            drawTerrain();

            // Phase 11: Trajectory Prediction Arrows
            // Draw a dim dashed line behind each enemy projectile pointing back toward its origin
            if (!gameState.isOver) {
                enemyProjectiles.forEach(ep => {
                    let speed = Math.hypot(ep.vx, ep.vz);
                    if (speed < 1) return;
                    // Normalized backward direction (opposite of travel in XZ)
                    let bx = -ep.vx / speed;
                    let bz = -ep.vz / speed;
                    let arrowLen = 180; // world units the arrow extends
                    let steps = 6;
                    let projected = project(ep.x, ep.y, ep.z);
                    if (projected.z <= 0) return;
                    // Build the arrow in world space
                    ctx.save();
                    ctx.strokeStyle = 'rgba(255, 140, 50, 0.38)';
                    ctx.lineWidth = 1.5;
                    ctx.setLineDash([5, 9]);
                    ctx.beginPath();
                    let moved = false;
                    for (let s = 0; s <= steps; s++) {
                        let t = s / steps;
                        let wx = ep.x + bx * arrowLen * t;
                        let wz = ep.z + bz * arrowLen * t;
                        let wy = getTerrainHeight(wx, wz) + 8;
                        let wp = project(wx, wy, wz);
                        if (wp.z > 0) {
                            if (!moved) { ctx.moveTo(wp.x, wp.y); moved = true; }
                            else ctx.lineTo(wp.x, wp.y);
                        }
                    }
                    ctx.stroke();
                    ctx.setLineDash([]);
                    ctx.restore();
                });
            }

            // Gather and sort 3D objects
            let renderables = [];
            
            if (!gameState.isOver) {
                // Draw Drone Radars for each drone
                drones.forEach(d => {
                    ctx.save();
                    let rRadius = d.radarRadius;
                    let drProj = project(d.x, d.y, d.z);
                    if (drProj.z > 0) {
                        // Draw Radar Sweeps
                        ctx.strokeStyle = 'rgba(0, 255, 255, 0.4)';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        let steps = 40;
                        let first = true;
                        for(let i=0; i<=steps; i++) {
                            let a = (i/steps)*Math.PI*2;
                            let cx = d.x + Math.cos(a)*rRadius;
                            let cz = d.z + Math.sin(a)*rRadius;
                            let cy = getTerrainHeight(cx, cz) + 5; // trace ground
                            let cp = project(cx, cy, cz);
                            if (cp.z > 0) {
                                if(first) { ctx.moveTo(cp.x, cp.y); first = false; }
                                else { ctx.lineTo(cp.x, cp.y); }
                            }
                        }
                        ctx.stroke();

                        // Radar sweep line
                        let sa = d.radarAngle;
                        let sx = d.x + Math.cos(sa)*rRadius;
                        let sz = d.z + Math.sin(sa)*rRadius;
                        let sy = getTerrainHeight(sx, sz) + 5;
                        let sp = project(sx, sy, sz);
                        if (sp.z > 0) {
                            let sweepGrad = ctx.createLinearGradient(drProj.x, drProj.y, sp.x, sp.y);
                            sweepGrad.addColorStop(0, 'rgba(0, 255, 255, 0.6)');
                            sweepGrad.addColorStop(1, 'rgba(0, 255, 255, 0.0)');
                            ctx.strokeStyle = sweepGrad;
                            ctx.lineWidth = 4;
                            ctx.beginPath();
                            ctx.moveTo(drProj.x, drProj.y);
                            ctx.lineTo(sp.x, sp.y);
                            ctx.stroke();
                        }
                    }
                    ctx.restore();
                    if (drProj.z > 0) renderables.push({ t: 'drone', dist: drProj.z, proj: drProj, obj: d });
                });

                // Phase 11: Draw Player Sensor Ring (narrow at Lv1, grows per level)
                (function drawPlayerSensorRing() {
                    let sensorRadius = 80 + (gameState.level - 1) * 80;
                    let pulse = 0.5 + 0.5 * Math.sin(performance.now() * 0.002);
                    ctx.save();
                    ctx.strokeStyle = `rgba(100, 200, 255, ${0.12 + pulse * 0.08})`;
                    ctx.lineWidth = 1.5;
                    ctx.setLineDash([8, 12]);
                    ctx.beginPath();
                    let steps = 48;
                    let firstSensor = true;
                    for (let i = 0; i <= steps; i++) {
                        let a = (i / steps) * Math.PI * 2;
                        let cx = player.x + Math.cos(a) * sensorRadius;
                        let cz = player.z + Math.sin(a) * sensorRadius;
                        let cy = getTerrainHeight(cx, cz) + 5;
                        let cp = project(cx, cy, cz);
                        if (cp.z > 0) {
                            if (firstSensor) { ctx.moveTo(cp.x, cp.y); firstSensor = false; }
                            else ctx.lineTo(cp.x, cp.y);
                        }
                    }
                    ctx.stroke();
                    ctx.setLineDash([]);
                    ctx.restore();
                })();

                let pProj = project(player.x, player.y, player.z);
                if (pProj.z > 0) renderables.push({ t: 'p', dist: pProj.z, proj: pProj, obj: player });
                
                drawPredictionArcs(); // Draw arcs behind UI but above terrain
            }

            for (let e of enemies) {
                let p = project(e.x, e.y, e.z);
                if (p.z > 0) renderables.push({ t: 'e', dist: p.z, proj: p, obj: e });
            }
            for (let m of missiles) {
                let p = project(m.x, m.y, m.z);
                if (p.z > 0) renderables.push({ t: 'm', dist: p.z, proj: p, obj: m });
            }            // Draw Data Cores
            for (let c of dataCores) {
                let p = project(c.x, c.y, c.z);
                if (p.z > 0) {
                    ctx.fillStyle = '#ffea00';
                    ctx.fillRect(p.x - 4*p.scale, p.y - 4*p.scale, 8*p.scale, 8*p.scale);
                }
            }
            
            // Draw Resources (Ammo)
            for (let r of resources) {
                let p = project(r.x, r.y, r.z);
                if (p.z > 0) {
                    let s = 10 * p.scale;
                    // Flash if about to despawn (< 5s left)
                    let alpha = 1.0;
                    if (r.age > 25.0) {
                        alpha = Math.floor(performance.now() / 150) % 2 === 0 ? 0.2 : 1.0;
                    }
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = '#666';
                    ctx.strokeStyle = '#aaa';
                    ctx.lineWidth = 1;
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(performance.now() * 0.005);
                    ctx.beginPath();
                    ctx.rect(-s, -s, s*2, s*2);
                    ctx.fill(); ctx.stroke();
                    ctx.restore();
                    ctx.globalAlpha = 1.0;
                }
            }
            

            for (let part of particles) {
                let p = project(part.x, part.y, part.z);
                if (p.z > 0) renderables.push({ t: 'part', dist: p.z, proj: p, obj: part });
            }

            // Depth sort (painter's algorithm)
            renderables.sort((a, b) => b.dist - a.dist);

            for (let r of renderables) {
                if (r.t === 'p') {
                    if (player.dashTimer > 0) {
                        ctx.globalAlpha = 0.5; // faint player main body during dodge
                        drawPlayer(r.proj);
                        ctx.globalAlpha = 1.0;
                    } else {
                        drawPlayer(r.proj);
                    }
                }
                else if (r.t === 'drone') drawDrone(r.proj, r.obj);
                else if (r.t === 'e') drawEnemy(r.proj, r.obj);
                else if (r.t === 'm') drawMissile(r.proj, r.obj);
                else if (r.t === 'core') {
                    ctx.save();
                    ctx.translate(r.proj.x, r.proj.y);
                    let s = r.proj.scale;
                    ctx.scale(s, s);
                    
                    let time = performance.now() * 0.002;
                    ctx.rotate(time);

                    // Flicker when about to expire (last 3 seconds)
                    let flickerAlpha = 1;
                    if (r.obj.lifetime !== undefined && r.obj.lifetime < 3) {
                        flickerAlpha = 0.4 + 0.6 * Math.abs(Math.sin(performance.now() * 0.015));
                    }
                    ctx.globalAlpha = flickerAlpha;
                    
                    ctx.fillStyle = r.obj.isBossObj ? '#333' : '#666';
                    ctx.strokeStyle = '#999';
                    ctx.lineWidth = 2;
                    let size = r.obj.isBossObj ? 20 : 8;
                    ctx.beginPath();
                    ctx.moveTo(0, -size); ctx.lineTo(size,0); ctx.lineTo(0, size); ctx.lineTo(-size, 0);
                    ctx.closePath();
                    ctx.fill(); ctx.stroke();
                    ctx.globalAlpha = 1;
                    ctx.restore();
                }
                else if (r.t === 'part') drawParticle(r.proj, r.obj);
            }
            
            // --- Fog of War / Visibility ---
            if (!gameState.isOver) {
                fogCtx.globalCompositeOperation = 'source-over';
                fogCtx.clearRect(0, 0, width, height);
                fogCtx.fillStyle = 'rgba(0, 5, 12, 0.95)';
                fogCtx.fillRect(0, 0, width, height);
                
                fogCtx.globalCompositeOperation = 'destination-out';
                
                // Helper to carve holes
                function carveHole(wx, wy, wz, worldRadius) {
                    let p = project(wx, wy, wz);
                    if (p.z > 0) {
                        let rad = p.scale * worldRadius;
                        let grad = fogCtx.createRadialGradient(p.x, p.y, rad * 0.3, p.x, p.y, rad);
                        grad.addColorStop(0, 'rgba(0,0,0,1)');
                        grad.addColorStop(1, 'rgba(0,0,0,0)');
                        fogCtx.fillStyle = grad;
                        fogCtx.beginPath();
                        fogCtx.arc(p.x, p.y, rad, 0, Math.PI * 2);
                        fogCtx.fill();
                    }
                }

                // Player visibility
                let playerReveal = 80 + (gameState.level - 1) * 80;
                carveHole(player.x, player.y, player.z, playerReveal * 1.5); 
                
                // Drone visibility
                for (let d of drones) {
                    carveHole(d.x, d.y, d.z, d.radarRadius * 1.5);
                }
                
                // Boss or exploding enemies can cast slight light
                for (let e of enemies) {
                    if (e.isBoss) carveHole(e.x, e.y, e.z, e.radius * 3);
                }
                
                ctx.drawImage(fogCanvas, -shakeX, -shakeY); 
            }
            
            ctx.restore(); // restore shake translation
            
            // --- UI Overlays ---
            
            // Update and Draw UI Messages (Combat Log)
            ctx.textAlign = 'right';
            ctx.font = '16px monospace';
            // Draw in bottom left corner, flowing DOWNWARDS
            let logTopAnchor = height - 160; 
            let msgIdx = 0;

            // Persistent Specific Alerts
            if (enemies.some(e => e.isBoss)) {
                ctx.fillStyle = '#f00'; ctx.globalAlpha = 1.0; ctx.textAlign = 'left';
                ctx.fillText("> ALERT: BOSS DETECTED - FOLLOW MISSILE TRAILS", 20, logTopAnchor + (msgIdx++ * 20));
            }
            if (gameState.ammo < gameState.maxLocks) {
                ctx.fillStyle = '#f80'; ctx.globalAlpha = (Math.floor(Date.now()/250)%2); // flashing
                ctx.fillText("> CRITICAL: OUT OF AMMO. COLLECT DATA CORES!", 20, logTopAnchor + (msgIdx++ * 20));
            }

            for (let i = uiMessages.length - 1; i >= 0; i--) {
                let msg = uiMessages[i];
                msg.time -= 1/60; 
                if (msg.time <= 0) {
                    uiMessages.splice(i, 1);
                    continue;
                }
                
                let lineY = logTopAnchor + ((msgIdx + i) * 20);
                let alpha = Math.min(1.0, msg.time);
                ctx.fillStyle = msg.color;
                ctx.globalAlpha = alpha;
                ctx.textAlign = 'left';
                ctx.fillText(msg.text, 20, lineY);
            }
            ctx.globalAlpha = 1.0;
            
            // Crosshair
            ctx.strokeStyle = '#888';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(width/2, height/2 - 50, 60, 0, Math.PI*2);
            ctx.stroke();

            // Reload / Out of Ammo Warnings overlay on the ammo bar
            let alertDiv = document.getElementById('ammo-alert');
            if (gameState.reloadTimer > 0) {
                alertDiv.innerText = `RELOADING... ${(gameState.reloadTimer).toFixed(1)}s`;
                alertDiv.style.color = Math.floor(now / 150) % 2 === 0 ? '#f00' : '#fff';
            } else if (gameState.ammo < gameState.maxLocks) {
                alertDiv.innerText = `OUT OF AMMO! FIND RESOURCES!`;
                alertDiv.style.color = Math.floor(now / 200) % 2 === 0 ? '#f80' : '#f00';
            } else {
                alertDiv.innerText = '';
            }
        }

        function gameLoop(now) {
            requestAnimationFrame(gameLoop);
            
            let dt = (now - gameState.lastTime) / 1000;
            if (dt > 0.1) dt = 0.1; // clamp delta
            gameState.lastTime = now;

            if (screenShake.time > 0) {
                screenShake.time -= dt;
                if (screenShake.time <= 0) screenShake.intensity = 0;
            }

            update(dt);
            draw();
        }

        // Start Game Flow
        let gameStarted = false;
        document.getElementById('startBtn').addEventListener('click', () => {
            document.getElementById('titlescreen').style.display = 'none';
            initAudio(); // MUST happen on user action
            if (!gameStarted) {
                initTerrain();
                gameState.lastTime = performance.now();
                requestAnimationFrame(gameLoop);
                gameStarted = true;
            }
        });
    </script>
</body>
</html>
