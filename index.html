<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drone Recon Strike</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #eee;
            overflow: hidden;
            touch-action: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: 800;
            color: #ff8800;
            user-select: none;
            -webkit-user-select: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        .btn-fire {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: rgba(255, 30, 30, 0.2);
            border: 3px solid #ff3333;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            pointer-events: auto;
            text-shadow: 0 0 10px #ff3333;
            box-shadow: 0 0 20px rgba(255, 50, 50, 0.4), inset 0 0 10px rgba(255, 50, 50, 0.4);
            transition: background 0.1s, transform 0.1s;
            cursor: pointer;
        }

        .btn-fire:active {
            background: rgba(255, 30, 30, 0.6);
            transform: scale(0.95);
        }

        #joystick-area {
            /* Invisible touch region */
            pointer-events: auto;
        }

        #joystick-base {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            top: 0;
            left: 0;
        }

        #joystick-stick {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 20px cyan;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            transition: transform 0.05s linear;
        }

        #score-board {
            position: absolute;
            top: 15px;
            left: 20px;
            font-size: 20px;
            line-height: 1.2;
            color: #ff8800;
            text-shadow: 2px 2px 0 #000;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 15px;
            border-left: 5px solid #ff8800;
            clip-path: polygon(0 0, 100% 0, 90% 100%, 0 100%);
        }

        #hp-bar-bg {
            position: absolute;
            top: 160px;
            left: 20px;
            width: 75px;
            height: 6px;
            border: 1px solid #ff8800;
            background: rgba(0, 0, 0, 0.7);
        }

        #hp-bar {
            width: 100%;
            height: 100%;
            background: #ff2200;
            box-shadow: 0 0 4px #ff2200;
            transition: width 0.2s;
        }

        #ammo-bar-bg {
            position: absolute;
            top: 195px;
            left: 20px;
            width: 75px;
            height: 6px;
            border: 1px solid #ff8800;
            background: rgba(0, 0, 0, 0.7);
        }

        #ammo-bar {
            width: 100%;
            height: 100%;
            background: #ffaa00;
            box-shadow: 0 0 4px #ffaa00;
            transition: width 0.2s;
        }

        #ammo-alert {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            text-align: center;
            color: #fff;
            font-size: 11px;
            font-weight: 900;
            line-height: 18px;
            pointer-events: none;
            text-shadow: 1px 1px 2px #000;
        }

        #gameover {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 0, 0, 0.85);
            color: #ff3333;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: auto;
        }

        .title {
            font-size: 60px;
            font-weight: bold;
            text-shadow: 0 0 20px #ff3333;
            margin-bottom: 20px;
            text-align: center;
        }

        .restart {
            margin-top: 40px;
            font-size: 24px;
            font-weight: bold;
            padding: 15px 40px;
            border: 2px solid white;
            color: white;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
            transition: all 0.2s;
        }

        .restart:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        @media (max-width: 768px) {
            .instruction {
                display: none;
            }

            /* Hide on mobile to save space */
        }

        .btn-dash {
            position: absolute;
            bottom: 30px;
            left: 190px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(0, 255, 255, 0.2);
            border: 3px solid #0df;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            pointer-events: auto;
            text-shadow: 0 0 10px #0df;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4), inset 0 0 10px rgba(0, 255, 255, 0.4);
            transition: background 0.1s, transform 0.1s;
            cursor: pointer;
        }

        .btn-dash:active {
            background: rgba(0, 255, 255, 0.6);
            transform: scale(0.95);
        }

        .btn-dash.cooldown {
            opacity: 0.5;
            pointer-events: none;
            border-color: #555;
            color: #ccc;
            box-shadow: none;
            text-shadow: none;
        }

        #titlescreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #001122 0%, #000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            pointer-events: auto;
        }

        .start-btn {
            margin-top: 50px;
            font-size: 32px;
            font-weight: 900;
            padding: 20px 80px;
            border: 4px solid #ff8800;
            color: #ff8800;
            border-radius: 0;
            background: rgba(0, 0, 0, 0.8);
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 136, 0, 0.5);
            text-shadow: 2px 2px 4px #000;
            transition: all 0.2s;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }

        .start-btn:hover {
            background: #ff8800;
            color: #000;
            box-shadow: 0 0 40px #ff8800;
            transform: scale(1.1);
        }
    </style>
</head>

<body>
    <canvas id="gameCanvas"></canvas>

    <div id="ui">
        <div id="score-board">
            SCORE: <span id="scoreVal" style="font-size: 26px;">0</span><br>
            <span style="font-size:16px;">LEVEL: <span id="levelVal">1</span></span><br>
            <span style="font-size:14px; color:#ffcc00;">MAX LOCKS: <span id="maxLockVal">10</span></span><br>
            <span style="font-size:14px; opacity: 0.7;">HIGH SCORE: <span id="bestScoreVal">0</span></span>
        </div>
        <div id="hp-bar-bg">
            <div style="position:absolute; top:-16px; left:0; font-size:10px; color:#ff8800;">CONDITION: NORMAL / LIFE
                STATUS</div>
            <div id="hp-bar"></div>
        </div>
        <div id="ammo-bar-bg">
            <div style="position:absolute; top:-16px; left:0; font-size:10px; color:#ff8800;">WEAPON SYSTEM / AMMUNITION
            </div>
            <div id="ammo-bar"></div>
            <div id="ammo-alert"></div>
        </div>


        <div id="joystick-area"
            style="position: absolute; top:0; left:0; width:100%; height:100%; pointer-events:auto;">
            <div id="joystick-base" style="display:none;">
                <div id="joystick-stick"></div>
            </div>
        </div>

    </div>

    <div id="titlescreen">
        <div class="title" style="color: #0df; text-shadow: 0 0 20px #0df;">DRONE RECON STRIKE</div>
        <div style="color: #aaa; font-size: 18px; margin-top:20px;">[ AUTO-BATTLER TACTICAL ACTION ]</div>
        <div class="start-btn" id="startBtn">START MISSION</div>
    </div>

    <div id="gameover">
        <div class="title">MISSION FAILED</div>
        <div style="font-size: 24px; color: white;">FINAL SCORE: <span id="finalScoreVal">0</span></div>
        <div class="restart" id="restartBtn">RESTART</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });

        const fogCanvas = document.createElement('canvas');
        const fogCtx = fogCanvas.getContext('2d', { alpha: true });

        let width, height;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            fogCanvas.width = width;
            fogCanvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        // ---- Game Constants & State ----
        const world = {
            camera: { x: 0, y: 2000, z: -700, pitch: Math.PI * 0.40, fov: 600 },
        };

        let gameState = {
            score: 0,
            highScore: localStorage.getItem('drs_score') || 0,
            playerHP: 100,
            level: 1,
            exp: 0,
            maxLocks: 10,
            bossActive: false,
            isOver: false,
            lastTime: performance.now(),
            ammo: 100, // Boosted starting ammo
            reloadTimer: 0,
            totalFiredSinceReload: 0,
            resourceSpawnTimer: 0
        };

        document.getElementById('bestScoreVal').innerText = gameState.highScore;

        // Entities
        let player = { x: 0, y: 0, z: 200, radius: 25, dashTimer: 0, dashCooldown: 0, history: [] };
        let drones = [
            { id: 0, x: 0, y: 40, z: 250, radarAngle: 0, radius: 10, radarRadius: 700 },
            { id: 1, x: -150, y: 40, z: 250, radarAngle: 2.09, radius: 10, radarRadius: 700 },
            { id: 2, x: 150, y: 40, z: 250, radarAngle: 4.18, radius: 10, radarRadius: 700 }
        ];
        let stars = []; // Defensive fix for reported ReferenceError
        let enemies = [];
        let missiles = [];
        let enemyProjectiles = [];
        let particles = [];
        let dataCores = [];
        let resources = [];
        let screenShake = { x: 0, y: 0, time: 0, intensity: 0 };

        let comboTimer = 0;
        let comboCount = 0;

        let radarAngle = 0;

        // UI Messages Log
        let uiMessages = [];
        function addMessage(text, color = '#333') {
            uiMessages.push({ text, color, time: 10.0 });
            if (uiMessages.length > 8) uiMessages.shift(); // Max 8 messages visible
        }

        // ---- Audio System (Web Audio API) ----
        let actx = null;
        let masterNode = null;

        function initAudio() {
            if (actx) return;
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            actx = new AudioContext();
            masterNode = actx.createGain();
            masterNode.gain.value = 0.4;
            masterNode.connect(actx.destination);
        }

        function playTone(freq, type, duration, vol = 1.0) {
            if (!actx) return null;
            let osc = actx.createOscillator();
            let gain = actx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, actx.currentTime);

            gain.gain.setValueAtTime(vol, actx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + duration);

            osc.connect(gain);
            gain.connect(masterNode);
            osc.start();
            osc.stop(actx.currentTime + duration);
            return { osc, gain };
        }

        function sfxLock(level) {
            playTone(400 + level * 150, 'square', 0.05, 0.05);
        }

        function sfxFire() {
            if (!actx) return;
            let o = playTone(800, 'sawtooth', 0.3, 0.15);
            o.osc.frequency.exponentialRampToValueAtTime(100, actx.currentTime + 0.3);
        }

        function sfxExplode() {
            if (!actx) return;
            let bufferSize = actx.sampleRate * 0.5; // 0.5s noise
            let buffer = actx.createBuffer(1, bufferSize, actx.sampleRate);
            let data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

            let noiseNode = actx.createBufferSource();
            noiseNode.buffer = buffer;
            let noiseFilter = actx.createBiquadFilter();
            noiseFilter.type = 'lowpass';
            noiseFilter.frequency.value = 800;

            let noiseGain = actx.createGain();
            noiseGain.gain.setValueAtTime(0.4, actx.currentTime);
            noiseGain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.5);

            noiseNode.connect(noiseFilter);
            noiseFilter.connect(noiseGain);
            noiseGain.connect(masterNode);
            noiseNode.start();
        }

        function sfxLevelUp() {
            if (!actx) return;
            let t = actx.currentTime;
            [880, 1046, 1318].forEach((f, i) => { // High fast major arpeggio
                let osc = actx.createOscillator();
                let gain = actx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(f, t + i * 0.05);
                gain.gain.setValueAtTime(0.0, t);
                gain.gain.setValueAtTime(0.1, t + i * 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, t + i * 0.05 + 0.1);
                osc.connect(gain);
                gain.connect(masterNode);
                osc.start(t + i * 0.05);
                osc.stop(t + i * 0.05 + 0.1);
            });
        }

        // Terrain logic: static grid using sine/cosine waves
        const tSize = 120; // Grid cell size
        const tViewRadius = 14;  // Cells rendered in each direction from camera

        function getTerrainHeight(x, z) {
            // Smooth natural hills using layered noise/sine waves
            let nx = x * 0.0015;
            let nz = z * 0.0015;
            let h1 = Math.sin(nx) * Math.cos(nz) * 400;
            let h2 = Math.sin(nx * 2.5 + 4) * Math.cos(nz * 2.5 + 2) * 150;
            // Introduce some flat valley floors
            let total = h1 + h2;
            return total < 0 ? total * 0.3 : total; // Valleys are shallower than mountains
        }

        const MAX_SLOPE = 1.0;
        function tryMove(obj, dx, dz) {
            let dist = Math.hypot(dx, dz);
            if (dist <= 0) return;

            let curH = getTerrainHeight(obj.x, obj.z);
            let nextH = getTerrainHeight(obj.x + dx, obj.z + dz);
            let slope = (nextH - curH) / dist;

            // Speed mult: 1.0 on flat/downhill. Reduces towards 0 as slope approaches MAX_SLOPE.
            let speedMult = 1.0;
            if (slope > 0) {
                speedMult = Math.max(0.1, 1.0 - (slope / MAX_SLOPE)); // Min 10% speed so they don't get completely stuck forever
            }

            obj.x += dx * speedMult;
            obj.z += dz * speedMult;
        }

        function initTerrain() {
            // No longer needed to instantiate rows
        }

        // ---- Input Handling ----
        const keys = { w: false, a: false, s: false, d: false };

        window.addEventListener('keydown', e => {
            let k = e.key.toLowerCase();
            if (k === 'arrowup') k = 'w';
            if (k === 'arrowdown') k = 's';
            if (k === 'arrowleft') k = 'a';
            if (k === 'arrowright') k = 'd';
            if (keys.hasOwnProperty(k)) keys[k] = true;
            // Space / Enter = fire (PC equivalent of touch-release)
            if (k === ' ' || k === 'enter' || k === 'f') {
                e.preventDefault();
                fireMissiles(8);
            }
        });

        window.addEventListener('keyup', e => {
            let k = e.key.toLowerCase();
            if (k === 'arrowup') k = 'w';
            if (k === 'arrowdown') k = 's';
            if (k === 'arrowleft') k = 'a';
            if (k === 'arrowright') k = 'd';
            if (keys.hasOwnProperty(k)) keys[k] = false;
        });

        // Touch Joystick
        const joyArea = document.getElementById('joystick-area');
        const joyStick = document.getElementById('joystick-stick');
        let joyTouchId = null;
        let joyCenter = { x: 70, y: 70 }; // relative to 140x140 area
        let joyInput = { x: 0, y: 0 };

        joyArea.addEventListener('touchstart', e => {
            e.preventDefault();
            let rect = joyArea.getBoundingClientRect();
            for (let t of e.changedTouches) {
                if (joyTouchId === null) {
                    joyTouchId = t.identifier;
                    joyCenter.x = t.clientX - rect.left;
                    joyCenter.y = t.clientY - rect.top;

                    document.getElementById('joystick-base').style.display = 'block';
                    document.getElementById('joystick-base').style.left = (joyCenter.x - 70) + 'px';
                    document.getElementById('joystick-base').style.top = (joyCenter.y - 70) + 'px';

                    updateJoy(t.clientX - rect.left, t.clientY - rect.top);
                }
            }
        }, { passive: false });

        joyArea.addEventListener('touchmove', e => {
            e.preventDefault();
            let rect = joyArea.getBoundingClientRect();
            for (let t of e.changedTouches) {
                if (t.identifier === joyTouchId) {
                    updateJoy(t.clientX - rect.left, t.clientY - rect.top);
                }
            }
        }, { passive: false });

        function endJoy(e) {
            e.preventDefault();
            for (let t of e.changedTouches) {
                if (t.identifier === joyTouchId) {
                    joyTouchId = null;
                    joyInput = { x: 0, y: 0 };
                    joyStick.style.transform = `translate(-50%, -50%)`;
                    document.getElementById('joystick-base').style.display = 'none';
                    // Touch-release fires 8 missiles across all valid targets
                    fireMissiles(8);
                }
            }
        }
        joyArea.addEventListener('touchend', endJoy, { passive: false });
        joyArea.addEventListener('touchcancel', endJoy, { passive: false });

        function updateJoy(px, py) {
            let dx = px - joyCenter.x;
            let dy = py - joyCenter.y;
            let dist = Math.hypot(dx, dy);
            let maxD = 40;
            if (dist > maxD) {
                dx = (dx / dist) * maxD;
                dy = (dy / dist) * maxD;
            }
            joyStick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            joyInput.x = dx / maxD;
            joyInput.y = dy / maxD;
        }

        // Control cleanup (auto-logic is handled in update loop)

        // ---- Core Logic ----

        function resetGame() {
            gameState.score = 0;
            gameState.playerHP = 100;
            gameState.level = 1;
            gameState.exp = 0;
            gameState.maxLocks = 10;
            gameState.isOver = false;
            comboCount = 0;
            document.getElementById('scoreVal').innerText = '0';
            document.getElementById('levelVal').innerText = '1';
            document.getElementById('maxLockVal').innerText = '3';
            updateHP();
            document.getElementById('gameover').style.display = 'none';
            player.x = 0; player.z = 200; player.dashTimer = 0; player.dashCooldown = 0;
            drones.forEach((d, i) => {
                d.x = 0; d.y = 40; d.z = 250; d.radarAngle = i * 2.09;
            });
            enemies = [];
            missiles = [];
            enemyProjectiles = [];
            particles = [];
            resources = [];
            dataCores = [];

            gameState.ammo = 100;
            gameState.reloadTimer = 0;
            gameState.totalFiredSinceReload = 0;
            gameState.resourceSpawnTimer = 0;
            uiMessages = [];
            updateAmmoBar();

            initTerrain();
            gameState.lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        document.getElementById('restartBtn').addEventListener('click', resetGame);

        function updateHP() {
            document.getElementById('hp-bar').style.width = Math.max(0, gameState.playerHP) + '%';
            if (gameState.playerHP <= 0 && !gameState.isOver) {
                gameState.isOver = true; // Check if dead

                if (gameState.score > gameState.highScore) {
                    gameState.highScore = gameState.score;
                    localStorage.setItem('drs_score', gameState.highScore);
                    document.getElementById('bestScoreVal').innerText = gameState.highScore;
                }

                document.getElementById('gameover').style.display = 'flex';
                document.getElementById('finalScoreVal').innerText = gameState.score;
                createExplosion(player.x, player.y, player.z, 200, '#0df');
                shakeCamera(1.5, 30);
            }
        }

        function shakeCamera(time, intensity) {
            screenShake.time = time;
            screenShake.intensity = intensity;
        }

        function doDash() {
            if (player.dashCooldown <= 0 && !gameState.isOver) {
                player.dashTimer = 0.3; // 300ms dash invuln
                player.dashCooldown = 1.0; // shortened cooldown for auto
                shakeCamera(0.2, 5);
                sfxFire(); // reuse fire sound for dash pop

                // Dash Scratch Particles – sparks + streaks in motion direction
                for (let i = 0; i < 22; i++) {
                    let side = (Math.random() - 0.5) * 500;
                    particles.push({
                        x: player.x, y: player.y, z: player.z,
                        vx: (Math.random() - 0.5) * 500, vy: (Math.random() - 0.5) * 500, vz: -1200 - Math.random() * 800,
                        time: 0, maxTime: 0.4 + Math.random() * 0.3, color: '#0ff', size: 3 + Math.random() * 5
                    });
                }
            }
        }

        function updateAmmoBar() {
            let maxCapacity = 100 + (gameState.level - 1) * 50;
            let pct = Math.max(0, Math.min(100, (gameState.ammo / maxCapacity) * 100));
            document.getElementById('ammo-bar').style.width = pct + '%';
        }

        function project(x, y, z) {
            let cx = x - world.camera.x;
            let cy = y - world.camera.y;
            let cz = z - world.camera.z;

            let cosP = Math.cos(world.camera.pitch);
            let sinP = Math.sin(world.camera.pitch);

            // Pitch world UP
            let yRot = cy * cosP + cz * sinP;
            let zRot = -cy * sinP + cz * cosP;

            if (zRot < 0.1) zRot = 0.1;
            let scale = world.camera.fov / zRot;

            return {
                x: width / 2 + cx * scale,
                y: height / 2 - yRot * scale,
                scale: scale,
                z: zRot
            };
        }

        function fireMissiles(overrideCount) {
            if (gameState.reloadTimer > 0) return; // Cannot fire while reloading
            let targets = enemies.filter(e => e.locks > 0);
            if (targets.length === 0) return;
            // If no locks yet, auto-lock 1 nearest enemy and fire
            if (targets.length === 0) return;
            let salvoSize = overrideCount || gameState.maxLocks;
            // Distribute salvo across locked targets
            let totalLocksNow = targets.reduce((s, t) => s + t.locks, 0);
            if (totalLocksNow === 0) {
                // No locks – assign salvo to nearest visible enemy
                let nearest = null, bestDist = Infinity;
                for (let e of enemies) {
                    let d = Math.hypot(e.x - player.x, e.z - player.z);
                    if (d < bestDist) { bestDist = d; nearest = e; }
                }
                if (nearest) { nearest.locks = salvoSize; targets = [nearest]; }
                else return;
            }

            sfxFire(); // Play one loud sound for barrage

            let missilesFired = 0;
            for (let t of targets) {
                let lockCount = t.locks;
                if (lockCount === 0) continue;

                t.locks = 0;
                t.targeted = true;

                for (let i = 0; i < lockCount; i++) {
                    const MIN_ENGAGE_DISTANCE = 300;
                    let distToTarget = Math.hypot(t.x - player.x, t.z - player.z);
                    let closePenalty = Math.max(0, (MIN_ENGAGE_DISTANCE - distToTarget) / MIN_ENGAGE_DISTANCE);
                    let veerX = closePenalty * (Math.random() - 0.5) * 3000;
                    let veerZ = closePenalty * (Math.random() - 0.5) * 3000;
                    let outX = (Math.random() - 0.5) * 800; // Barrage spread
                    let outZ = (Math.random() - 0.5) * 800;
                    missiles.push({
                        x: player.x,
                        y: player.y + 10,
                        z: player.z,
                        startY: player.y + 10,
                        vx: outX + veerX,
                        vy: 600 + Math.random() * 600,
                        vz: outZ + veerZ,
                        tObj: t,
                        time: 0,
                        type: Math.floor(Math.random() * 3),
                        trail: []
                    });
                    missilesFired++;
                }
            }

            // Ammo and Reload logic
            if (missilesFired > 0) {
                let prevAmmo = gameState.ammo;
                gameState.ammo -= missilesFired;
                updateAmmoBar();
                gameState.totalFiredSinceReload += missilesFired;

                // Force a reload after every 20 shots
                if (gameState.totalFiredSinceReload >= 20) {
                    gameState.reloadTimer = 3.0;
                    gameState.totalFiredSinceReload = 0; // reset for next magazine
                    addMessage("> Warning: Reloading Magazine...", "#f80");
                }

                if (gameState.ammo < 10 && prevAmmo >= 10) {
                    addMessage("> CRITICAL: Out of Ammo", "#f00");
                }
            }
        }

        function addExp(amount) {
            gameState.exp += amount;
            let reqExp = gameState.level * 300;
            if (gameState.exp >= reqExp) {
                gameState.exp -= reqExp;
                gameState.level++;
                document.getElementById('levelVal').innerText = gameState.level;

                // Increase ammo limit by 50 and refill ammo
                gameState.ammo += 50;
                updateAmmoBar();
                addMessage(`> Level Up! Ammo Capacity Expanded (+50)`, "#0f0");

                sfxLevelUp();
                // level up flash
                createExplosion(player.x, player.y, player.z, 2, '#0f0');
            }
        }

        function sfxBossSpawn() {
            if (!actx) return;
            playTone(150, 'sawtooth', 2.0, 0.4);
            setTimeout(() => playTone(120, 'sawtooth', 2.0, 0.4), 500);
        }

        function sfxCollect() {
            if (!actx) return;
            playTone(800, 'sine', 0.1, 0.1);
            setTimeout(() => playTone(1200, 'sine', 0.15, 0.1), 50);
        }

        function spawnEnemy() {
            if (gameState.isOver) return;

            if (gameState.level > 0 && gameState.level % 5 === 0 && !enemies.some(e => e.isBoss)) {
                gameState.bossActive = true;
                enemies = [];
                sfxBossSpawn();
                addMessage('> ALERT: BOSS DETECTED', '#f00');
                let ang = Math.random() * Math.PI * 2;
                let bx = player.x + Math.cos(ang) * 1500;
                let bz = player.z + Math.sin(ang) * 1500;
                let bossId = performance.now();
                enemies.push({
                    x: bx, y: 0, z: bz,
                    radius: 120,
                    hp: 50 + (gameState.level * 20),
                    maxHp: 50 + (gameState.level * 20),
                    locks: 0, targeted: false,
                    speed: 250, hoverTime: 0,
                    state: 'approach', stateTimer: 0,
                    isBoss: true, bossId: bossId,
                    dashCooldown: 0
                });
                // Weapon nodes: 6 around the boss, individually targetable
                const WN_COUNT = 6;
                for (let wi = 0; wi < WN_COUNT; wi++) {
                    let wAng = (wi / WN_COUNT) * Math.PI * 2;
                    enemies.push({
                        x: bx + Math.cos(wAng) * 200, y: 0, z: bz + Math.sin(wAng) * 200,
                        radius: 22, hp: 15, maxHp: 15,
                        locks: 0, targeted: false,
                        speed: 0, hoverTime: Math.random() * 10,
                        state: 'orbit', stateTimer: 0,
                        fireTimer: 2.0 + Math.random() * 2.0,
                        isBoss: false, type: 'weapon_node',
                        squadId: bossId, orbitAngle: wAng,
                        dashCooldown: 0, interceptCooldown: 0,
                    });
                }
                return;
            }

            // Squad Spawn (Missiler, Gunner, Patrol)
            // Squad Spawn (1 Missiler, 3 Gunners, 3 Patrols)
            let ang = Math.random() * Math.PI * 2;
            let dist = 1400 + Math.random() * 400;
            let cx = player.x + Math.cos(ang) * dist;
            let cz = player.z + Math.sin(ang) * dist;
            let squadId = performance.now(); // unique ID

            // Missiler (Hardest) x 1
            enemies.push({ 
                x: cx, y: 0, z: cz, radius: 18, 
                hp: 10, maxHp: 10, 
                locks: 0, targeted: false, 
                speed: 200 + (gameState.level * 15), 
                hoverTime: Math.random() * 10, 
                state: 'approach', stateTimer: 0, 
                isBoss: false, type: 'missiler', 
                dashCooldown: 0, interceptCooldown: 0, 
                squadId: squadId,
                flankAngle: Math.random() * Math.PI * 2 
            });

            // Gunners (Medium) x 3
            for (let i = 0; i < 3; i++) {
                let offX = (Math.random() - 0.5) * 200;
                let offZ = (Math.random() - 0.5) * 200;
                enemies.push({ 
                    x: cx + offX, y: 0, z: cz + offZ, radius: 12, 
                    hp: 3, maxHp: 3, 
                    locks: 0, targeted: false, 
                    speed: 280 + (gameState.level * 20), 
                    hoverTime: Math.random() * 10, 
                    state: 'approach', stateTimer: 0, 
                    isBoss: false, type: 'gunner', 
                    dashCooldown: 0, interceptCooldown: 0, 
                    squadId: squadId,
                    flankAngle: Math.random() * Math.PI * 2 
                });
            }

            // Patrols (Weak) x 3
            for (let i = 0; i < 3; i++) {
                let offX = (Math.random() - 0.5) * 300;
                let offZ = (Math.random() - 0.5) * 300;
                enemies.push({ 
                    x: cx + offX, y: 0, z: cz + offZ, radius: 10, 
                    hp: 2, maxHp: 2, 
                    locks: 0, targeted: false, 
                    speed: 320 + (gameState.level * 20), 
                    hoverTime: Math.random() * 10, 
                    state: 'approach', stateTimer: 0, 
                    isBoss: false, type: 'patrol', 
                    dashCooldown: 0, interceptCooldown: 0, 
                    squadId: squadId,
                    flankAngle: Math.random() * Math.PI * 2 
                });
            }
        }

        function createExplosion(x, y, z, scale = 1, forceColor = null) {
            sfxExplode();
            // Flash
            particles.push({
                x, y, z, vx: 0, vy: 0, vz: 0,
                time: 0.15, maxTime: 0.15,
                color: forceColor || '#ff8800', size: 150 * scale, isFlash: true
            });
            // Debris
            for (let i = 0; i < 25; i++) {
                let ang = Math.random() * Math.PI * 2;
                let spd = Math.random() * 600 * scale;
                let up = Math.random() * 500 * scale;
                particles.push({
                    x, y, z,
                    vx: Math.cos(ang) * spd,
                    vy: up, // + is UP in world
                    vz: Math.sin(ang) * spd,
                    time: 0.5 + Math.random() * 0.5,
                    maxTime: 1.0,
                    color: forceColor || (Math.random() > 0.5 ? '#ff3333' : '#ff9900'),
                    size: (15 + Math.random() * 25) * scale
                });
            }
        }

        let autoLockTimer = 0;

        function update(dt) {

            if (gameState.isOver) {
                // Keep moving particles for cool effect after death
                updateParticles(dt);
                return;
            }

            // --- Auto-Lock and Auto-Fire Logic (Drone Radar) ---
            autoLockTimer += dt;
            if (autoLockTimer > 0.15) {
                autoLockTimer = 0;

                let totalLocks = 0;
                for (let e of enemies) totalLocks += e.locks;

                // Phase 11: Narrow initial sensor radius (200 at Lv1, +80/level)
                let playerSensorRadius = 200 + (gameState.level - 1) * 80;

                // Find valid targets in drone radar range OR player sensor range
                let validTargets = [];
                for (let e of enemies) {
                    let inDroneRange = drones.some(d => Math.hypot(e.x - d.x, e.z - d.z) < d.radarRadius);
                    let inPlayerRange = Math.hypot(e.x - player.x, e.z - player.z) < playerSensorRadius;
                    if ((inDroneRange || inPlayerRange) && e.locks < (e.isBoss ? 15 : 4)) {
                        validTargets.push(e);
                    }
                }

                if (totalLocks < gameState.maxLocks && validTargets.length > 0) {
                    let slotsLeft = gameState.maxLocks - totalLocks;
                    // Sort by distance to formation center (nearest first)
                    if (drones.length >= 3) {
                        let cx = (drones[0].x + drones[1].x + drones[2].x) / 3;
                        let cz = (drones[0].z + drones[1].z + drones[2].z) / 3;
                        validTargets.sort((a, b) => Math.hypot(a.x - cx, a.z - cz) - Math.hypot(b.x - cx, b.z - cz));
                    }
                    // Distribute available lock slots evenly across as many targets as possible
                    let targetCount = Math.min(validTargets.length, slotsLeft);
                    let baseLocksEach = Math.floor(slotsLeft / targetCount);
                    let extra = slotsLeft % targetCount;
                    for (let i = 0; i < targetCount; i++) {
                        let t = validTargets[i];
                        let grant = baseLocksEach + (i < extra ? 1 : 0);
                        let maxAllowed = (t.isBoss ? 15 : 4) - t.locks;
                        grant = Math.min(grant, maxAllowed);
                        if (grant <= 0) continue;
                        t.locks += grant;
                        sfxLock(t.locks);
                        particles.push({
                            x: t.x, y: t.y, z: t.z, vx: 0, vy: 0, vz: 0,
                            time: 0.1, maxTime: 0.1, color: 'rgba(255,140,0,0.4)', size: 80, isRing: true
                        });
                    }
                }

                // Auto-fire disabled – firing is manual (touch-release only)
            }

            // Reload logic
            if (gameState.reloadTimer > 0) {
                gameState.reloadTimer -= dt;
            }

            // Dash status
            if (player.dashTimer > 0) {
                player.dashTimer -= dt;
                // Dash Effects: Ghost Disc and Scratches
                if (Math.random() < 0.6) {
                    // Ghost outline
                    particles.push({
                        x: player.x, y: player.y, z: player.z,
                        vx: 0, vy: 0, vz: 0, time: 0, maxTime: 0.15, 
                        color: 'rgba(0, 255, 255, 0.3)', size: player.radius * 2.2, isRing: true
                    });
                    // Streak sparks
                    for(let j=0; j<3; j++) {
                        particles.push({
                            x: player.x + (Math.random()-0.5)*40, y: player.y, z: player.z,
                            vx: (Math.random()-0.5)*300, vy: (Math.random()-0.5)*300, vz: -1500,
                            time: 0, maxTime: 0.2, color: '#fff', size: 2
                        });
                    }
                }
            }
            if (player.dashCooldown > 0) {
                player.dashCooldown -= dt;
            }

            // Combo Timer
            if (comboTimer > 0) {
                comboTimer -= dt;
                if (comboTimer <= 0) {
                    if (comboCount >= 2) {
                        addMessage(`> COMBO x${comboCount}!`, '#888');
                    }
                    comboCount = 0;
                }
            }

            // --- Auto Evasion ---
            if (player.dashCooldown <= 0) {
                for (let ep of enemyProjectiles) {
                    let dToProj = Math.hypot(ep.x - player.x, ep.z - player.z);
                    if (dToProj < 200 && ep.z > player.z) { // projectile is close and approaching
                        doDash();
                        break;
                    }
                }
            }

            // Data Cores & Resources (Magnet + Collection)
            let magnetRadius = 400 + (gameState.level * 10); // Magnet grows with level

            // Process Data Cores (EXP)
            for (let i = dataCores.length - 1; i >= 0; i--) {
                let c = dataCores[i];
                let dist = Math.hypot(c.x - player.x, c.y - player.y, c.z - player.z);

                // Tick down lifetime
                if (c.lifetime !== undefined) {
                    c.lifetime -= dt;
                    if (c.lifetime <= 0) {
                        dataCores.splice(i, 1);
                        continue;
                    }
                }

                if (dist < magnetRadius && c.time > 0.5) {
                    let spd = 1200 * dt;
                    c.x += (player.x - c.x) / dist * spd;
                    c.y += (player.y - c.y) / dist * spd;
                    c.z += (player.z - c.z) / dist * spd;
                }

                if (dist < player.radius + 15) {
                    addExp(20);
                    sfxCollect();
                    particles.push({
                        x: player.x, y: player.y, z: player.z, vx: 0, vy: 0, vz: 0,
                        time: 0.1, maxTime: 0.1, color: '#ffea00', size: 40, isRing: true
                    });
                    dataCores.splice(i, 1);
                    continue;
                }

                if (c.z < world.camera.z) {
                    dataCores.splice(i, 1);
                }
            }

            // Process Resources (Ammo)
            for (let i = resources.length - 1; i >= 0; i--) {
                let r = resources[i];
                let dist = Math.hypot(r.x - player.x, r.y - player.y, r.z - player.z);

                r.age += dt;
                if (r.age > 30.0) { // Despawn after 30s
                    resources.splice(i, 1);
                    continue;
                }

                // Auto-collect range is smaller than EXP cores to require deliberate pickup
                let collectRange = 400; // GREATLY increased magnetic pull distance
                if (dist < collectRange) {
                    let spd = 2000 * dt; // Much faster magnetic pull
                    r.x += (player.x - r.x) / dist * spd;
                    r.y += (player.y - r.y) / dist * spd;
                    r.z += (player.z - r.z) / dist * spd;
                }

                // Increased collection hit radius
                if (dist < player.radius + 60) {
                    // Refill ammo (+50 per resource)
                    let maxAmmo = 100 + (gameState.level - 1) * 50;
                    let added = Math.min(50, maxAmmo - gameState.ammo);
                    gameState.ammo = Math.min(gameState.ammo + 50, maxAmmo);
                    updateAmmoBar();

                    if (added > 0) {
                        addMessage(`> Ammo Replenished (+${added})`, "#888");
                    }

                    sfxCollect(); // Play sound
                    // Collection flash
                    particles.push({
                        x: player.x, y: player.y, z: player.z, vx: 0, vy: 0, vz: 0,
                        time: 0.1, maxTime: 0.1, color: '#f80', size: 100, isRing: true
                    });

                    resources.splice(i, 1);
                }
            }

            // Random Map Resource Spawning
            gameState.resourceSpawnTimer += dt;
            if (gameState.resourceSpawnTimer > 4.0 && resources.length < 15) {
                gameState.resourceSpawnTimer = 0;
                let angle = Math.random() * Math.PI * 2;
                let dist = 800 + Math.random() * 800; // Spawn 800-1600 units away
                let spawnX = player.x + Math.cos(angle) * dist;
                let spawnZ = player.z + Math.sin(angle) * dist;
                resources.push({
                    x: spawnX,
                    y: getTerrainHeight(spawnX, spawnZ) + 15, // Spawn directly on the ground, slightly elevated
                    z: spawnZ,
                    vx: 0, vy: 0, vz: 0,
                    time: 0,
                    age: 0 // Used for 30s despawn
                });
            }

            // Player Movement (Input based)
            let mx = 0, mz = 0;
            if (keys.a) mx -= 1;
            if (keys.d) mx += 1;
            if (keys.w) mz += 1;
            if (keys.s) mz -= 1;

            if (joyInput.x !== 0 || joyInput.y !== 0) {
                mx += joyInput.x;
                mz -= joyInput.y; // joy down = positive Y, world backward = negative Z
            }

            // Normalize
            if (mx !== 0 && mz !== 0) {
                let len = Math.hypot(mx, mz);
                mx /= len; mz /= len;
            }

            let speed = player.dashTimer > 0 ? 1800 : 700;
            tryMove(player, mx * speed * dt, mz * speed * dt);

            // 360-degree Top-Down bounds
            // No strict clamping; open world map.

            // Hover strictly over terrain
            player.y = getTerrainHeight(player.x, player.z) + Math.sin(performance.now() * 0.005) * 10 + 20;

            let tN = performance.now();
            // Drone AI companion movement (3-way separated tethered seek)
            drones.forEach((d, idx) => {
                let angleOffset = idx * (Math.PI * 2 / 3);

                // Base formation anchor (orbiting the player, 2x further distance)
                let distBase = 750;
                let anchorX = player.x + Math.cos(tN * 0.0003 + angleOffset) * distBase;
                let anchorZ = player.z - 100 + Math.sin(tN * 0.0003 + angleOffset) * distBase;

                // Find nearest enemy to THIS drone's ANCHOR position to keep them separated
                let nearestSq = Infinity;
                let targetE = null;
                for (let e of enemies) {
                    if (!e) continue;
                    let dSq = (e.x - anchorX) ** 2 + (e.z - anchorZ) ** 2;
                    // Only target if within its 2700-unit operational sector
                    if (dSq < nearestSq && dSq < 2700 * 2700) {
                        nearestSq = dSq;
                        targetE = e;
                    }
                }

                let targetX = anchorX;
                let targetZ = anchorZ;

                if (targetE) {
                    // Try to hover over the enemy, but clamped to a max reach from the anchor
                    // so they maintain their 3-way separation angles
                    let tx = targetE.x - anchorX;
                    let tz = targetE.z - 50 - anchorZ;
                    let tLen = Math.hypot(tx, tz);
                    const MAX_REACH = 1800;
                    if (tLen > MAX_REACH) {
                        tx = (tx / tLen) * MAX_REACH;
                        tz = (tz / tLen) * MAX_REACH;
                    }
                    targetX = anchorX + tx;
                    targetZ = anchorZ + tz;
                }

                // Keep moving drones constantly to keep them lively
                let jitterX = Math.cos(tN * 0.002 + idx) * 50;
                let jitterZ = Math.sin(tN * 0.0015 + idx) * 50;

                d.x += (targetX + jitterX - d.x) * dt * 2.5;
                d.z += (targetZ + jitterZ - d.z) * dt * 2.5;
                d.y = getTerrainHeight(d.x, d.z) + 160 + Math.sin(tN * 0.004 + idx) * 30;
                d.radarAngle += dt * 3;
            });

            // Camera follow (ease top-down XZ)
            world.camera.x += (player.x - world.camera.x) * dt * 4;
            world.camera.z += (player.z - 700 - world.camera.z) * dt * 4;

            // Enemies overall cap (reduced to combat clutter since 1 squad = 7 mobs)
            let maxEnemies = 14 + Math.floor(gameState.level * 2);
            let spawnChance = 0.05 + (gameState.level * 0.02);
            if (enemies.length < maxEnemies && Math.random() < spawnChance) spawnEnemy();

            let patrolAlive = enemies.some(e => !e.isBoss && e.type === 'patrol');
            let baseEngageDist = patrolAlive ? 1200 : 700;
            let missilerAmmo = patrolAlive ? 4 : 2;

            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                if (!e) continue;
                e.hoverTime += dt * 5;
                e.y = getTerrainHeight(e.x, e.z) + 10 + Math.sin(e.hoverTime) * 15; // hover over terrain
                if (e.dashCooldown > 0) e.dashCooldown -= dt; // Phase 10: Tick down dash cooldown
                if (e.interceptCooldown > 0) e.interceptCooldown -= dt; // Missile interception cooldown

                // State machine
                let dxP = player.x - e.x;
                let dzP = player.z - e.z;
                let distToPlayer = Math.hypot(dxP, dzP);

                if (e.type === 'weapon_node') {
                    // Orbit the boss core
                    let boss = enemies.find(b => b.isBoss && b.bossId === e.squadId);
                    if (!boss) { e.hp = 0; continue; }
                    e.orbitAngle += dt * 0.6;
                    let orbitR = boss.radius * 1.6;
                    let tX = boss.x + Math.cos(e.orbitAngle) * orbitR;
                    let tZ = boss.z + Math.sin(e.orbitAngle) * orbitR;
                    e.x += (tX - e.x) * Math.min(1, dt * 5);
                    e.z += (tZ - e.z) * Math.min(1, dt * 5);
                    e.y = boss.y + 20;
                    // Fire in facing direction (outward from boss)
                    e.fireTimer -= dt;
                    if (e.fireTimer <= 0) {
                        e.fireTimer = 2.5 + Math.random() * 1.5;
                        sfxFire();
                        let outAng = e.orbitAngle;
                        // 3-way spread
                        for (let b = -1; b <= 1; b++) {
                            let a = outAng + b * 0.35;
                            enemyProjectiles.push({
                                x: e.x, y: e.y, z: e.z,
                                vx: Math.cos(a) * 700, vy: 0, vz: Math.sin(a) * 700,
                                time: 0, maxTime: 5
                            });
                        }
                    }
                } else if (!e.isBoss && e.hp < e.maxHp && e.state !== 'flee') {
                    // NEW: Flee if low HP
                    e.state = 'flee';
                }

                if (e.state === 'flee') {
                    let len = Math.max(1, distToPlayer);
                    tryMove(e, (-dxP / len) * (e.speed * 1.5) * dt, (-dzP / len) * (e.speed * 1.5) * dt);
                    if (distToPlayer > 3000) e.state = 'approach';
                } else if (e.state === 'approach') {
                    // FLANKING: Move towards an offset point around the player
                    let targetDist = e.type === 'missiler' ? 900 : 600;
                    if (e.isBoss) targetDist = 0; 

                    let fAng = e.flankAngle || 0;
                    let tx = player.x + Math.cos(fAng) * targetDist;
                    let tz = player.z + Math.sin(fAng) * targetDist;
                    
                    let dxT = tx - e.x;
                    let dzT = tz - e.z;
                    let distToT = Math.hypot(dxT, dzT);

                    if (distToT > 150) {
                        let len = Math.max(1, distToT);
                        tryMove(e, (dxT / len) * e.speed * dt, (dzT / len) * e.speed * dt);
                    } else {
                        e.state = 'aim';
                        e.stateTimer = 1.0 + Math.random() * 0.5;
                    }

                    // Existing logic for state transition if player is close enough manually
                    let engageDist = e.isBoss ? 900 : (e.type === 'missiler' ? baseEngageDist : 600);
                    if (distToPlayer < engageDist * 0.8) {
                        e.state = 'aim';
                        e.stateTimer = 1.0 + Math.random() * 0.5;
                    }
                } else if (e.state === 'aim') {
                    // drift towards player slowly
                    let len = Math.max(1, distToPlayer);
                    tryMove(e, (dxP / len) * (e.speed * 0.3) * dt, (dzP / len) * (e.speed * 0.3) * dt);

                    e.stateTimer -= dt;
                    // Telegraph aim
                    if (Math.random() < 0.2) {
                        particles.push({
                            x: e.x, y: e.y + (e.isBoss ? 40 : -10), z: e.z, vx: 0, vy: 0, vz: 0,
                            time: 0.1, maxTime: 0.1, color: 'rgba(150, 150, 150, 0.5)', size: e.isBoss ? 150 : 40, isRing: true
                        });
                    }
                    if (e.stateTimer <= 0) {
                        e.state = 'fire';

                        let dyP = player.y - e.y;
                        let pLen = Math.hypot(dxP, dyP, dzP);

                        if (e.isBoss) {
                            // Boss fires a spread pattern
                            sfxFire();
                            for (let bang = -2; bang <= 2; bang++) {
                                let ang = bang * 0.15;
                                let cosA = Math.cos(ang), sinA = Math.sin(ang);
                                let vx = (dxP / pLen) * cosA - (dzP / pLen) * sinA;
                                let vz = (dxP / pLen) * sinA + (dzP / pLen) * cosA;
                                enemyProjectiles.push({
                                    x: e.x, y: e.y + 20, z: e.z,
                                    vx: vx * 900, vy: (dyP / pLen) * 900, vz: vz * 900, time: 0
                                });
                            }
                            e.stateTimer = 4.0;
                        } else if (e.type === 'missiler') {
                            let patrolAliveInSquad = enemies.some(other => other.squadId === e.squadId && other.type === 'patrol');
                            sfxFire();

                            if (patrolAliveInSquad) {
                                // Has patrol support: Heavy Missiles
                                for (let k = 0; k < missilerAmmo; k++) {
                                    let spreadX = (Math.random() - 0.5) * 400;
                                    let spreadZ = (Math.random() - 0.5) * 400;
                                    enemyProjectiles.push({
                                        x: e.x, y: e.y, z: e.z,
                                        vx: (dxP / pLen) * 800 + spreadX, vy: (dyP / pLen) * 800 + 400, vz: (dzP / pLen) * 800 + spreadZ,
                                        time: 0
                                    });
                                }
                            } else {
                                // No patrols left: Downgrade to standard shots
                                for (let bang = -1; bang <= 1; bang++) {
                                    let ang = bang * 0.1;
                                    let cosA = Math.cos(ang), sinA = Math.sin(ang);
                                    let vx = (dxP / pLen) * cosA - (dzP / pLen) * sinA;
                                    let vz = (dxP / pLen) * sinA + (dzP / pLen) * cosA;
                                    enemyProjectiles.push({
                                        x: e.x, y: e.y, z: e.z,
                                        vx: vx * 1000, vy: (dyP / pLen) * 1000, vz: vz * 1000, time: 0
                                    });
                                }
                            }
                            e.stateTimer = 4.0 + Math.random();
                        } else if (e.type === 'gunner') {
                            sfxFire();
                            for (let bang = -1; bang <= 1; bang++) {
                                let ang = bang * 0.2;
                                let cosA = Math.cos(ang), sinA = Math.sin(ang);
                                let vx = (dxP / pLen) * cosA - (dzP / pLen) * sinA;
                                let vz = (dxP / pLen) * sinA + (dzP / pLen) * cosA;
                                enemyProjectiles.push({
                                    x: e.x, y: e.y, z: e.z,
                                    vx: vx * 1200, vy: (dyP / pLen) * 1200, vz: vz * 1200, time: 0
                                });
                            }
                            e.stateTimer = 2.5 + Math.random();
                        } else if (e.type === 'patrol') {
                            enemyProjectiles.push({
                                x: e.x, y: e.y, z: e.z,
                                vx: (dxP / pLen) * 500, vy: (dyP / pLen) * 500, vz: (dzP / pLen) * 500,
                                time: 0
                            });
                            e.stateTimer = 4.0;
                        }
                    }
                } else if (e.state === 'fire') {
                    // post-fire drift
                    e.stateTimer -= dt;
                    if (e.stateTimer <= 0) {
                        e.state = 'approach';
                    }
                }

                // collision with player (physical body ram)
                if (distToPlayer < e.radius + player.radius) {
                    if (player.dashTimer <= 0) {
                        gameState.playerHP -= 20;
                        updateHP();
                        shakeCamera(0.5, 20);
                    }
                    createExplosion(e.x, e.y, e.z);
                    enemies.splice(i, 1);
                    continue;
                }

                let distCam = Math.hypot(e.x - world.camera.x, e.z - world.camera.z);
                if (distCam > 3000) {
                    enemies.splice(i, 1);
                }
            }

            // Enemy Projectiles
            for (let i = enemyProjectiles.length - 1; i >= 0; i--) {
                let ep = enemyProjectiles[i];
                ep.time += dt;
                ep.x += ep.vx * dt;
                ep.y += ep.vy * dt;
                ep.z += ep.vz * dt;

                // draw a red trail
                for (let k = 0; k < 2; k++) {
                    particles.push({
                        x: ep.x + (Math.random() - 0.5) * 10, y: ep.y + (Math.random() - 0.5) * 10, z: ep.z + (Math.random() - 0.5) * 10,
                        vx: (Math.random() - 0.5) * 100, vy: (Math.random() - 0.5) * 100, vz: (Math.random() - 0.5) * 100,
                        time: 0.2 + Math.random() * 0.2, maxTime: 0.4, color: '#ff6600', size: 5 + Math.random() * 10
                    });
                }

                // hit player
                let dist = Math.hypot(ep.x - player.x, ep.y - player.y, ep.z - player.z);
                if (dist < 30) {
                    if (player.dashTimer <= 0) {
                        gameState.playerHP -= 15;
                        updateHP();
                        shakeCamera(0.3, 15);
                        createExplosion(ep.x, ep.y, ep.z, 0.5, '#f00');
                    }
                    enemyProjectiles.splice(i, 1);
                    continue;
                }

                // timeout
                if (ep.time > 4 || ep.z < world.camera.z) {
                    enemyProjectiles.splice(i, 1);
                }
            }

            // Missiles
            for (let i = missiles.length - 1; i >= 0; i--) {
                let m = missiles[i];
                m.time += dt;

                if (m.trail) {
                    m.trail.push({ x: m.x, y: m.y, z: m.z });
                    if (m.trail.length > 30) m.trail.shift(); // Longer, more dramatic trail
                }

                // If target is dead or disappeared, just fly straight
                let hasTarget = enemies.includes(m.tObj);

                if (hasTarget) {
                    let dx = m.tObj.x - m.x;
                    let dy = m.tObj.y - m.y;
                    let dz = m.tObj.z - m.z;
                    let dist = Math.hypot(dx, dy, dz);

                    // Phase 10: Enemy Dash Evasion
                    if (dist < 200 && m.tObj.dashCooldown <= 0 && Math.random() < 0.25) {
                        // Dash perpendicular to missile's incoming direction (XZ plane)
                        let perpX = -dz / dist;
                        let perpZ = dx / dist;
                        let dashMag = 250 + Math.random() * 150;
                        let side = Math.random() < 0.5 ? 1 : -1;
                        m.tObj.x += perpX * dashMag * side;
                        m.tObj.z += perpZ * dashMag * side;
                        m.tObj.dashCooldown = 1.5; // 1.5s cooldown
                    }

                    // Missile Interception (Enemies shoot down missiles)
                    if (dist < 400 && m.tObj.interceptCooldown <= 0 && Math.random() < 0.15) {
                        createExplosion(m.x, m.y, m.z, 0.4, '#aaa'); // Intercept explosion
                        particles.push({
                            x: m.tObj.x, y: m.tObj.y, z: m.tObj.z, vx: 0, vy: 0, vz: 0,
                            time: 0.1, maxTime: 0.1, color: '#888', size: 20
                        }); // Muzzle flash

                        m.tObj.interceptCooldown = 0.5 + Math.random(); // Cooldown
                        missiles.splice(i, 1);
                        continue; // Missile destroyed
                    }

                    if (dist < 80) { // hit radius
                        // Mechanics Update: Height Advantage Damage Calculation
                        let heightDiff = Math.max(0, m.startY - m.tObj.y);
                        let damage = 1;
                        let heightBonus = heightDiff / 100; // e.g., 200 height = +2 dmg
                        damage += heightBonus;

                        createExplosion(m.tObj.x, m.tObj.y, m.tObj.z, 1.0 + (heightBonus * 0.4), heightBonus >= 1.5 ? '#aaa' : null);

                        m.tObj.hp -= damage;
                        if (m.tObj.hp <= 0) {
                            let eIdx = enemies.indexOf(m.tObj);
                            if (eIdx !== -1) {
                                let enObj = enemies[eIdx];
                                enemies.splice(eIdx, 1);

                                // Spawn Data Core(s)
                                let coreYield = enObj.isBoss ? 20 : 1;
                                for (let k = 0; k < coreYield; k++) {
                                    dataCores.push({
                                        x: enObj.x + (Math.random() - 0.5) * 100,
                                        y: enObj.y,
                                        z: enObj.z + (Math.random() - 0.5) * 100,
                                        isBossObj: enObj.isBoss,
                                        lifetime: enObj.isBoss ? 12 : 8 // seconds before disappearing
                                    });
                                }

                                if (enObj.isBoss) {
                                    gameState.bossActive = false;
                                    createExplosion(enObj.x, enObj.y, enObj.z, 4.0, '#888');
                                    addMessage('> BOSS DESTROYED!', '#f0f');
                                    shakeCamera(1.5, 20);
                                    // advance level safely past the % 5 mark instantly
                                    addExp(300);
                                } else if (enObj.type === 'weapon_node') {
                                    addMessage('> Weapon node destroyed! Boss weakened.', '#f80');
                                    createExplosion(enObj.x, enObj.y, enObj.z, 1.5, '#f80');
                                }

                                comboCount++;
                                comboTimer = 2.0;
                                let scoreGain = 10 * comboCount; // Reduced direct score, gems give the rest
                                gameState.score += scoreGain;

                                document.getElementById('scoreVal').innerText = gameState.score;

                                if (comboCount > 1) {
                                    let cText = document.getElementById('comboText');
                                    cText.innerText = `${comboCount}x COMBO!`;
                                    cText.style.opacity = '1';
                                    cText.style.transform = `scale(${1 + comboCount * 0.1})`;
                                    setTimeout(() => cText.style.transform = 'scale(1)', 100);
                                }
                                shakeCamera(0.2, 5 + comboCount * 2);
                            }
                        }
                        missiles.splice(i, 1);
                        continue;
                    }

                    // Steer towards target: "Itano Circus" realistic homing
                    let speed = 1200; // max missile flying speed
                    let turnRate = Math.min(8, m.time * 4); // turn rate increases intensely over time

                    let nx = (dx / dist) * speed;
                    let ny = (dy / dist) * speed;
                    let nz = (dz / dist) * speed;

                    m.vx += (nx - m.vx) * turnRate * dt;
                    m.vy += (ny - m.vy) * turnRate * dt;
                    m.vz += (nz - m.vz) * turnRate * dt;
                } else {
                    // target lost, keep current velocity but add gravity
                    m.vy -= 400 * dt;
                }

                m.x += m.vx * dt;
                m.y += m.vy * dt;
                m.z += m.vz * dt;

                let groundY = getTerrainHeight(m.x, m.z);
                // Time out or hit mountain Early
                if (m.y < groundY - 20) {
                    createExplosion(m.x, m.y, m.z, 0.5, '#aaa'); // premature mountain explosion
                    missiles.splice(i, 1);
                    continue;
                }

                // Absolute timeout
                if (m.time > 5 || m.z < world.camera.z - 1000) {
                    missiles.splice(i, 1);
                    continue;
                }

                // Trail sparks
                if (Math.random() < 0.5) {
                    particles.push({
                        x: m.x + (Math.random() - 0.5) * 10, y: m.y, z: m.z,
                        vx: 0, vy: 0, vz: 0,
                        time: 0.15, maxTime: 0.15, color: '#ffaa00', size: 10
                    });
                }
            }

            updateParticles(dt);
        }

        function updateParticles(dt) {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.time -= dt;
                if (p.time <= 0) {
                    particles.splice(i, 1);
                } else {
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                    p.z += p.vz * dt;
                    // gravity
                    if (!p.isFlash && !p.isRing) p.vy -= 800 * dt;
                }
            }
        }

        // ---- Rendering ----

        function drawTerrain() {
            ctx.lineWidth = 1;

            let camCellX = Math.floor(world.camera.x / tSize);
            let camCellZ = Math.floor(world.camera.z / tSize);

            let polys = [];

            // Generate polygon data for visible cells
            for (let x = camCellX - tViewRadius; x <= camCellX + tViewRadius; x++) {
                for (let z = camCellZ - tViewRadius; z <= camCellZ + tViewRadius; z++) {
                    let wx = x * tSize;
                    let wz = z * tSize;

                    let h11 = getTerrainHeight(wx, wz);
                    let h12 = getTerrainHeight(wx + tSize, wz);
                    let h21 = getTerrainHeight(wx, wz + tSize);
                    let h22 = getTerrainHeight(wx + tSize, wz + tSize);

                    let p11 = project(wx, h11, wz);
                    let p12 = project(wx + tSize, h12, wz);
                    let p21 = project(wx, h21, wz + tSize);
                    let p22 = project(wx + tSize, h22, wz + tSize);

                    // Skip polygons entirely behind camera
                    if (p11.z < 0 && p12.z < 0 && p21.z < 0 && p22.z < 0) continue;

                    let dist = Math.hypot((wx + tSize / 2) - world.camera.x, (wz + tSize / 2) - world.camera.z);
                    let maxDist = tViewRadius * tSize;
                    let fog = Math.max(0, Math.min(1, 1 - (dist / maxDist)));
                    if (fog <= 0.05) continue;

                    let avgH1 = (h11 + h12 + h21) / 3;
                    let avgH2 = (h12 + h22 + h21) / 3;

                    let baseColH1 = 200 + Math.min(40, avgH1 / 10);
                    let baseColH2 = 200 + Math.min(40, avgH2 / 10);

                    polys.push({
                        zDepth: p11.z + p12.z + p21.z, // Approx depth
                        draw: function () {
                            // Tri 1
                            ctx.fillStyle = `rgba(${baseColH1 - 10}, ${baseColH1}, ${baseColH1 + 30}, ${fog})`;
                            ctx.strokeStyle = `rgba(0, 150, 255, ${fog * 0.2})`;
                            ctx.beginPath();
                            ctx.moveTo(p11.x, p11.y);
                            ctx.lineTo(p12.x, p12.y);
                            ctx.lineTo(p21.x, p21.y);
                            ctx.closePath();
                            ctx.fill(); ctx.stroke();
                        }
                    });

                    polys.push({
                        zDepth: p12.z + p22.z + p21.z,
                        draw: function () {
                            // Tri 2
                            ctx.fillStyle = `rgba(${baseColH2 - 10}, ${baseColH2 - 5}, ${baseColH2 + 20}, ${fog})`;
                            ctx.beginPath();
                            ctx.moveTo(p12.x, p12.y);
                            ctx.lineTo(p22.x, p22.y);
                            ctx.lineTo(p21.x, p21.y);
                            ctx.closePath();
                            ctx.fill(); ctx.stroke();
                        }
                    });
                }
            }

            // Painter's Algorithm: Sort back to front (highest zDepth to lowest)
            polys.sort((a, b) => b.zDepth - a.zDepth);
            for (let p of polys) p.draw();
        }

        function drawPlayer(proj) {
            let s = proj.scale * player.radius;

            // ---- Turret angle: track first locked enemy ----
            let turretWorldAngle = player.angle || 0;
            let locked = enemies.filter(e => e.locks > 0);
            if (locked.length > 0) {
                let t = locked[0];
                turretWorldAngle = Math.atan2(t.x - player.x, -(t.z - player.z));
            }

            let tTime = performance.now() * 0.015;
            let moving = (keys.w || keys.a || keys.s || keys.d || joyInput.x !== 0 || joyInput.y !== 0);
            let walkCycle = moving ? tTime : 0;

            ctx.save();
            ctx.translate(proj.x, proj.y);
            ctx.rotate(player.angle || 0);

            // ---- 4 LEGS (simple 2-segment, radiating from disc) ----
            const legAngles = [-50, 50, -130, 130]; // degrees
            const legPhases = [0, Math.PI, Math.PI, 0];

            function drawAbstractLeg(angDeg, phase) {
                let ang = angDeg * Math.PI / 180;
                let lift = Math.max(0, Math.sin(walkCycle + phase));
                let bob  = Math.cos(walkCycle + phase) * s * 0.25;

                let shX = Math.cos(ang) * s * 0.9;
                let shY = Math.sin(ang) * s * 0.9;
                let kX  = Math.cos(ang) * s * 1.7 + Math.sin(ang) * s * 0.3;
                let kY  = Math.sin(ang) * s * 1.4 - Math.cos(ang) * s * 0.2 + bob * 0.4;
                let fX  = Math.cos(ang) * s * 2.1;
                let fY  = Math.sin(ang) * s * 1.7 + bob - lift * s * 0.55;

                ctx.strokeStyle = '#aaaaaa'; ctx.lineWidth = s * 0.5; ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(shX, shY); ctx.lineTo(kX, kY); ctx.stroke();
                ctx.strokeStyle = '#eeeeee'; ctx.lineWidth = s * 0.3;
                ctx.beginPath(); ctx.moveTo(shX, shY); ctx.lineTo(kX, kY); ctx.stroke();

                ctx.strokeStyle = '#aaaaaa'; ctx.lineWidth = s * 0.4;
                ctx.beginPath(); ctx.moveTo(kX, kY); ctx.lineTo(fX, fY); ctx.stroke();
                ctx.strokeStyle = '#eeeeee'; ctx.lineWidth = s * 0.24;
                ctx.beginPath(); ctx.moveTo(kX, kY); ctx.lineTo(fX, fY); ctx.stroke();

                ctx.fillStyle = '#cccccc';
                ctx.beginPath(); ctx.arc(fX, fY, s * 0.3, 0, Math.PI * 2); ctx.fill();
            }

            // Back legs first
            drawAbstractLeg(legAngles[2], legPhases[2]);
            drawAbstractLeg(legAngles[3], legPhases[3]);

            // ---- MAIN DISC BODY ----
            ctx.fillStyle = '#aaaaaa';
            ctx.beginPath(); ctx.arc(0, 0, s * 1.2, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#eeeeee';
            ctx.beginPath(); ctx.arc(0, 0, s * 1.05, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#ffffff';
            ctx.beginPath(); ctx.arc(0, 0, s * 0.65, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#cccccc';
            ctx.beginPath(); ctx.arc(0, 0, s * 0.25, 0, Math.PI * 2); ctx.fill();

            // Front legs (over body)
            drawAbstractLeg(legAngles[0], legPhases[0]);
            drawAbstractLeg(legAngles[1], legPhases[1]);


            ctx.restore();
        }



        function drawEnemy(proj, en) {
            // Make enemy scale slightly larger (1.4x default)
            let isBoss = en.isBoss;
            let s = proj.scale * en.radius * (isBoss ? 1 : 1.4);
            ctx.save();
            ctx.translate(proj.x, proj.y);

            let tTime = performance.now() * 0.015;
            let walkCycle = tTime * (en.speed / 200);

            // Shadow
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.beginPath(); ctx.ellipse(0, s * 1.8, s * 2.5, s * 0.8, 0, 0, Math.PI * 2); ctx.fill();

            if (isBoss) {
                // --- BOSS RENDER ---
                ctx.fillStyle = '#110000';
                ctx.strokeStyle = '#f33';
                ctx.lineWidth = 4;

                // Boss HP bar — drawn BEFORE any rotation, in local (translated) space
                // Only boss has HP bar over its head
                if (isBoss) {
                    let hpRatio = en.hp / en.maxHp;
                    let barW = s * 2.2;
                    let barH = 10;
                    let barY = -s * 1.8;
                    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(-barW/2 - 1, barY - 1, barW + 2, barH + 2);
                    ctx.fillStyle = 'rgba(200,0,0,0.3)'; ctx.fillRect(-barW/2, barY, barW, barH);
                    ctx.fillStyle = `hsl(${hpRatio*120},100%,50%)`; ctx.fillRect(-barW/2, barY, barW * hpRatio, barH);
                    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.strokeRect(-barW/2, barY, barW, barH);
                    // BOSS label
                    ctx.fillStyle = '#f00'; ctx.font = `bold ${Math.ceil(barH * 1.2)}px monospace`;
                    ctx.textAlign = 'center';
                    ctx.fillText('BOSS', 0, barY - 4);
                }

                // Body Main Hull
                ctx.beginPath();
                ctx.moveTo(-s, 0); ctx.lineTo(-s * 0.8, -s * 0.6); ctx.lineTo(s * 0.8, -s * 0.6); ctx.lineTo(s, 0);
                ctx.lineTo(s * 0.8, s * 0.4); ctx.lineTo(-s * 0.8, s * 0.4);
                ctx.closePath();
                ctx.fill(); ctx.stroke();

                // Giant Cannon
                ctx.beginPath();
                ctx.moveTo(-s * 0.2, -s * 0.6); ctx.lineTo(-s * 0.1, -s * 1.2);
                ctx.lineTo(s * 0.1, -s * 1.2); ctx.lineTo(s * 0.2, -s * 0.6);
                ctx.fill(); ctx.stroke();

                // Glowing Core
                ctx.fillStyle = '#f00';
                ctx.beginPath();
                ctx.arc(0, 0, s * 0.2 + Math.sin(tTime * 5) * 5, 0, Math.PI * 2);
                ctx.fill();



            } else if (en.type === 'weapon_node') {
                // Weapon node: a glowing hexagonal emitter
                let alive = en.hp > 0;
                let wRatio = en.hp / en.maxHp;
                // Outer glow ring
                ctx.fillStyle = en.targeted ? `rgba(255,100,0,0.3)` : `rgba(${alive?'255,100,0':'80,80,80'},0.15)`;
                ctx.beginPath(); ctx.arc(0, 0, s * 1.5, 0, Math.PI * 2); ctx.fill();
                // Body
                ctx.fillStyle = alive ? `hsl(${wRatio*50+10},100%,20%)` : '#222';
                ctx.strokeStyle = alive ? `hsl(${wRatio*50+10},100%,${en.targeted?70:50}%)` : '#444';
                ctx.lineWidth = en.targeted ? 3 : 2;
                // Hex shape
                ctx.beginPath();
                for (let hi = 0; hi < 6; hi++) {
                    let ha = hi * Math.PI / 3;
                    hi === 0 ? ctx.moveTo(Math.cos(ha)*s, Math.sin(ha)*s) : ctx.lineTo(Math.cos(ha)*s, Math.sin(ha)*s);
                }
                ctx.closePath(); ctx.fill(); ctx.stroke();
                // Center light
                if (alive) {
                    let pulse = 0.5 + Math.sin(performance.now() * 0.008 + en.orbitAngle) * 0.5;
                    ctx.fillStyle = `rgba(255,150,0,${pulse})`;
                    ctx.beginPath(); ctx.arc(0, 0, s * 0.35, 0, Math.PI * 2); ctx.fill();
                }
                // HP bar
                let barW = s * 2; let barH = 4; let barY = -s * 1.5;
                ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(-barW/2, barY, barW, barH);
                ctx.fillStyle = `hsl(${wRatio*50+10},100%,50%)`; ctx.fillRect(-barW/2, barY, barW*wRatio, barH);

            } else {
                // ---- Abstract geometric enemies (spinning shapes) ----
                let rot = performance.now() * 0.001 * (1 + en.speed / 300);

                let color = en.targeted ? '#f55' :
                            en.type === 'missiler' ? '#f44' :
                            en.type === 'gunner'   ? '#ff4' :
                            '#4f4'; // patrol

                ctx.strokeStyle = color;
                ctx.fillStyle = en.targeted ? 'rgba(255,30,30,0.25)' : 'rgba(0,0,0,0.85)';
                ctx.lineWidth = en.targeted ? 3 : 2;

                // Outer spinning ring with corner tick marks
                ctx.save();
                ctx.rotate(rot);
                ctx.beginPath(); ctx.arc(0, 0, s * 1.2, 0, Math.PI * 2);
                ctx.fill(); ctx.stroke();
                for (let ti = 0; ti < 4; ti++) {
                    ctx.save(); ctx.rotate(ti * Math.PI / 2);
                    ctx.fillStyle = color;
                    ctx.fillRect(s * 0.95, -s * 0.12, s * 0.28, s * 0.24);
                    ctx.restore();
                }
                ctx.restore();

                // Inner counter-rotating type shape
                ctx.save();
                ctx.rotate(-rot * 1.5);
                ctx.strokeStyle = color;
                ctx.fillStyle = 'rgba(0,0,0,0.9)';
                ctx.lineWidth = 2;

                if (en.type === 'missiler') {
                    // Triangle
                    ctx.beginPath();
                    ctx.moveTo(0, -s * 0.9);
                    ctx.lineTo(s * 0.78, s * 0.45);
                    ctx.lineTo(-s * 0.78, s * 0.45);
                    ctx.closePath(); ctx.fill(); ctx.stroke();
                    ctx.fillStyle = color;
                    ctx.beginPath(); ctx.arc(0, 0, s * 0.2, 0, Math.PI * 2); ctx.fill();
                } else if (en.type === 'gunner') {
                    // Square
                    ctx.beginPath(); ctx.rect(-s * 0.7, -s * 0.7, s * 1.4, s * 1.4);
                    ctx.fill(); ctx.stroke();
                    ctx.strokeStyle = color; ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(-s * 0.4, -s * 0.4); ctx.lineTo(s * 0.4, s * 0.4);
                    ctx.moveTo(s * 0.4, -s * 0.4); ctx.lineTo(-s * 0.4, s * 0.4);
                    ctx.stroke();
                } else {
                    // Diamond (patrol)
                    ctx.beginPath();
                    ctx.moveTo(0, -s * 0.9); ctx.lineTo(s * 0.65, 0);
